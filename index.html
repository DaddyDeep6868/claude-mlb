45)\">\n                    <div style=\"width:40px;height:40px;border-radius:50%;flex:none;background:{{ p.ring }};display:grid;place-items:center\"><div style=\"position:relative;width:32px;height:32px;border-radius:50%;background:#0c0e14;overflow:hidden;display:grid;place-items:center\"><img src=\"{{ p.headshot }}\" alt=\"\" referrerpolicy=\"no-referrer\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;opacity:.45\" onerror=\"this.remove()\"><span style=\"position:relative;font-family:'Space Grotesk';font-weight:700;font-size:12px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.8);letter-spacing:-.01em\">{{ p.score }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fdiv><div style=\"font-size:11px;letter-spacing:1px\"><span style=\"color:#ffc24d\">{{ p.starsOn }}<\u002Fspan><span style=\"color:#3a4150\">{{ p.starsOff }}<\u002Fspan> <span style=\"color:#7b8597;letter-spacing:0\">HR {{ p.modelPct }}%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:right\"><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px\">{{ p.best }}<\u002Fdiv><div style=\"font-size:11px;color:{{ p.evColor }};font-weight:600\">{{ p.ev }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- RADAR -->\n      <sc-if value=\"{{ isRadar }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"margin-bottom:16px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">WEATHER RADAR<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Where the dingers fly tonight<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:620px\">Every park live, sized and colored by its ball-carry index — wind direction off center field, speed, and temperature folded into one number. Hot parks glow red. Tap one for its hitters.<\u002Fp>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ radarHasData }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:16px;align-items:start\">\n\n          <!-- MAP -->\n          <div style=\"position:relative;background:radial-gradient(ellipse at 50% 40%,#11202e,#0b0f16 75%);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;aspect-ratio:1.62/1;min-height:260px;min-width:0\">\n            <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:7% 9%\"><\u002Fdiv>\n            <div style=\"position:absolute;left:14px;top:12px;font-family:'Space Grotesk';font-size:11px;letter-spacing:.1em;color:#5f6878;font-weight:700\">USA · LIVE CONDITIONS<\u002Fdiv>\n            <sc-for list=\"{{ radarParks }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <button data-game=\"{{ r.gameId }}\" onclick=\"{{ setRadarSel }}\" title=\"{{ r.venue }}\" style=\"position:absolute;left:{{ r.x }}%;top:{{ r.y }}%;transform:translate(-50%,-50%);width:{{ r.size }}px;height:{{ r.size }}px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);background:{{ r.dotColor }};box-shadow:0 0 18px rgba(255,93,93,{{ r.glow }});cursor:pointer;padding:0;z-index:3;transition:transform .15s\" style-hover=\"transform:translate(-50%,-50%) scale(1.35);z-index:5\"><\u002Fbutton>\n            <\u002Fsc-for>\n            <!-- legend -->\n            <div style=\"position:absolute;right:14px;bottom:12px;display:flex;align-items:center;gap:7px;background:rgba(8,11,17,.7);padding:6px 10px;border-radius:9px;backdrop-filter:blur(8px)\">\n              <span style=\"font-size:10px;color:#8b94a6;font-weight:600\">DEAD<\u002Fspan>\n              <span style=\"width:54px;height:7px;border-radius:4px;background:linear-gradient(90deg,#5b8fc9,#ffc24d,#ff5d5d)\"><\u002Fspan>\n              <span style=\"font-size:10px;color:#8b94a6;font-weight:600\">FLYING<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SELECTED PARK -->\n          <sc-if value=\"{{ radarSel }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.09);border-radius:18px;overflow:hidden\">\n            <div style=\"padding:16px 17px;border-bottom:1px solid rgba(255,255,255,.07);background:linear-gradient(135deg,rgba(255,138,76,.08),transparent)\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n                <div style=\"min-width:0\">\n                  <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ radarSel.matchup }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#7b8597;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ radarSel.venue }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right;flex:none\">\n                  <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:30px;line-height:1;color:{{ radarSel.dotColor }}\">{{ radarSel.carry }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#7b8597;font-weight:600;letter-spacing:.04em\">CARRY INDEX<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:11px;font-size:12.5px;font-weight:600;color:{{ radarSel.dotColor }}\">{{ radarSel.condText }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;border-bottom:1px solid rgba(255,255,255,.07)\">\n              <div style=\"flex:1;padding:12px 14px;border-right:1px solid rgba(255,255,255,.06)\"><div style=\"font-size:10px;color:#7b8597;font-weight:700;letter-spacing:.04em\">TEMP<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:18px;font-weight:700;margin-top:3px\">{{ radarSel.temp }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;padding:12px 14px;border-right:1px solid rgba(255,255,255,.06)\"><div style=\"font-size:10px;color:#7b8597;font-weight:700;letter-spacing:.04em\">WIND<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:18px;font-weight:700;margin-top:3px\">{{ radarSel.wind }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;padding:12px 14px\"><div style=\"font-size:10px;color:#7b8597;font-weight:700;letter-spacing:.04em\">HR EFFECT<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:18px;font-weight:700;margin-top:3px;color:{{ radarSel.multColor }}\">{{ radarSel.multLabel }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 16px\">\n              <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:10px\">TOP BATS HERE<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <sc-for list=\"{{ radarSel.topHitters }}\" as=\"h\" hint-placeholder-count=\"3\">\n                  <div data-player=\"{{ h.id }}\" onclick=\"{{ openDrawer }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;background:#0c0e14;border:1px solid rgba(255,255,255,.06)\">\n                    <div style=\"width:38px;height:38px;flex:none;border-radius:50%;background:{{ h.ring }};display:grid;place-items:center\"><div style=\"position:relative;width:30px;height:30px;border-radius:50%;background:#0c0e14;overflow:hidden;display:grid;place-items:center\"><img src=\"{{ h.headshot }}\" alt=\"\" referrerpolicy=\"no-referrer\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;opacity:.45\" onerror=\"this.remove()\"><span style=\"position:relative;font-family:'Space Grotesk';font-weight:700;font-size:11px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.8);letter-spacing:-.01em\">{{ h.score }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ h.name }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597\">HR {{ h.modelPct }}%<\u002Fdiv><\u002Fdiv>\n                    <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--ac,#ff8a4c)\">{{ h.best }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- PARK RANKING STRIP -->\n        <div style=\"display:flex;align-items:center;gap:9px;margin:24px 0 13px\"><span style=\"width:3px;height:17px;border-radius:2px;background:var(--ac,#ff8a4c);flex:none\"><\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:18px;font-weight:700\">Tonight's parks by carry<\u002Fh2><span style=\"font-size:12px;color:#7b8597\">{{ radarHot }} parks playing hot<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px\">\n          <sc-for list=\"{{ radarParks }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <button data-game=\"{{ r.gameId }}\" onclick=\"{{ setRadarSel }}\" style=\"text-align:left;cursor:pointer;background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:12px\" style-hover=\"border-color:rgba(255,138,76,.4)\">\n              <div style=\"width:44px;height:44px;flex:none;border-radius:11px;background:{{ r.dotColor }};display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:17px;color:#0a0c11;box-shadow:0 0 14px rgba(255,93,93,{{ r.glow }})\">{{ r.carry }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.matchup }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">{{ r.temp }} · {{ r.wind }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:13px;color:{{ r.multColor }};flex:none\">{{ r.multLabel }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ radarHasData }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:none\"><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SOLVER -->\n      <sc-if value=\"{{ isSolver }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--pos,#35d0c0);font-weight:700;margin-bottom:6px\">SLATE SOLVER<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Tonight's optimal card<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:640px\">Set your bankroll and the solver scans every +EV play, then sizes each bet by <strong style=\"color:#c3cad6\">fractional Kelly<\u002Fstrong> — the math that maximizes long-run growth without over-betting. This is portfolio construction, not a single pick.<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- Controls -->\n        <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;margin-bottom:22px\">\n          <div>\n            <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">BANKROLL<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;padding:9px 13px;border-radius:11px;background:#0c0e14;border:2px solid rgba(53,208,192,.35)\">\n              <span style=\"font-size:16px;font-weight:700;color:#9aa3b2;margin-right:4px\">$<\u002Fspan>\n              <input type=\"text\" inputmode=\"decimal\" value=\"{{ bankroll }}\" onchange=\"{{ setBankroll }}\" placeholder=\"1000\" style=\"width:90px;background:transparent;border:none;color:#eef1f6;font-family:'Space Grotesk';font-weight:700;font-size:18px;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">STAKING (KELLY FRACTION)<\u002Fdiv>\n            <div style=\"display:flex;gap:5px\">\n              <sc-for list=\"{{ kfOpts }}\" as=\"k\" hint-placeholder-count=\"3\">\n                <button data-frac=\"{{ k.f }}\" onclick=\"{{ setKellyFrac }}\" style=\"padding:8px 12px;border-radius:9px;cursor:pointer;border:1px solid {{ k.border }};background:{{ k.bg }};color:{{ k.fg }};text-align:center\">\n                  <div style=\"font-weight:700;font-size:12.5px\">{{ k.label }}<\u002Fdiv>\n                  <div style=\"font-size:10px;opacity:.7;margin-top:1px\">{{ k.sub }}<\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">RISK PROFILE<\u002Fdiv>\n            <div style=\"display:flex;gap:5px\">\n              <sc-for list=\"{{ riskOpts }}\" as=\"r\" hint-placeholder-count=\"3\">\n                <button data-risk=\"{{ r.r }}\" onclick=\"{{ setSolverRisk }}\" style=\"padding:9px 13px;border-radius:9px;cursor:pointer;font-weight:700;font-size:12.5px;border:1px solid {{ r.border }};background:{{ r.bg }};color:{{ r.fg }}\">{{ r.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ solver.needsOdds }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:40px 20px;text-align:center\">\n            <div style=\"margin-bottom:12px;display:flex;justify-content:center;opacity:.55\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7b8597\" stroke-width=\"1.6\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"4.5\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1\" fill=\"#7b8597\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk';font-size:18px;font-weight:700;color:#c3cad6\">Connect odds to solve the slate<\u002Fdiv>\n            <p style=\"margin:8px auto 0;font-size:13.5px;color:#7b8597;max-width:380px\">Kelly sizing needs live prices. The solver activates once your OddsBlaze feed posts props.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ solver.hasBets }}\" hint-placeholder-val=\"{{ false }}\">\n          <!-- Summary bar -->\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:14px\">\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">PLAYS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:26px;font-weight:700;margin-top:4px\">{{ solver.betCount }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">TOTAL RISK<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:26px;font-weight:700;margin-top:4px\">{{ solver.totalStaked }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">EXP. PROFIT<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:26px;font-weight:700;margin-top:4px;color:{{ solver.expProfitColor }}\">{{ solver.expProfit }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">EXP. ROI<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:26px;font-weight:700;margin-top:4px;color:{{ solver.expProfitColor }}\">{{ solver.expROI }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Exposure bar -->\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 16px;margin-bottom:22px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\"><span style=\"font-size:12px;color:#9aa3b2;font-weight:600\">Bankroll exposure tonight<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:{{ solver.exposureColor }}\">{{ solver.exposurePct }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:8px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden\"><div style=\"width:{{ solver.exposureWidth }};height:100%;background:{{ solver.exposureColor }}\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Straight bets -->\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><span style=\"width:3px;height:17px;border-radius:2px;background:var(--pos,#35d0c0);flex:none\"><\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:18px;font-weight:700\">Recommended straight bets<\u002Fh2><\u002Fdiv>\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;margin-bottom:24px\">\n            <sc-for list=\"{{ solver.bets }}\" as=\"b\" hint-placeholder-count=\"4\">\n              <div data-player=\"{{ b.id }}\" onclick=\"{{ openDrawer }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05)\" style-hover=\"background:#161a24\">\n                <div style=\"width:42px;height:42px;flex:none;border-radius:50%;background:{{ b.ring }};display:grid;place-items:center\"><div style=\"position:relative;width:34px;height:34px;border-radius:50%;background:#0c0e14;overflow:hidden;display:grid;place-items:center\"><img src=\"{{ b.headshot }}\" alt=\"\" referrerpolicy=\"no-referrer\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;opacity:.45\" onerror=\"this.remove()\"><span style=\"position:relative;font-family:'Space Grotesk';font-weight:700;font-size:13px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.8);letter-spacing:-.01em\">{{ b.score }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ b.name }} <span style=\"font-size:11.5px;color:#7b8597;font-weight:500\">{{ b.team }} · HR<\u002Fspan><\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">HR {{ b.modelPct }}% · Kelly {{ b.kellyPct }} of bankroll<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;min-width:50px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">ODDS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--ac,#ff8a4c)\">{{ b.odds }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;min-width:48px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">EV<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:{{ b.evColor }}\">{{ b.ev }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:right;min-width:80px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">STAKE → WIN<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px\">{{ b.stake }} <span style=\"color:var(--pos,#35d0c0)\">→ {{ b.toWin }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- Anchor parlay -->\n          <sc-if value=\"{{ solver.anchor }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><span style=\"width:3px;height:17px;border-radius:2px;background:var(--ac,#ff8a4c);flex:none\"><\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:18px;font-weight:700\">Anchor parlay <span style=\"font-size:12px;color:#7b8597;font-weight:500\">— 1u upside flyer<\u002Fspan><\u002Fh2><\u002Fdiv>\n            <div style=\"background:#13161e;border:1px solid rgba(255,138,76,.22);border-radius:16px;padding:16px\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:14px\">\n                <div><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">ODDS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:20px;color:var(--ac,#ff8a4c)\">{{ solver.anchor.odds }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">WIN%<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:20px\">{{ solver.anchor.winPct }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">EV<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:20px;color:var(--pos,#35d0c0)\">{{ solver.anchor.ev }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">STAKE → WIN<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:20px\">{{ solver.anchor.stake }} <span style=\"color:var(--pos,#35d0c0)\">→ {{ solver.anchor.toWin }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1\"><\u002Fdiv>\n                <button onclick=\"{{ addSolverToSlip }}\" style=\"padding:11px 17px;border:none;border-radius:11px;cursor:pointer;font-family:'Hanken Grotesk';font-weight:800;font-size:13.5px;color:#0a0c11;background:var(--ac,#ff8a4c)\">+ Add to slip<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:7px\">\n                <sc-for list=\"{{ solver.anchor.legs }}\" as=\"l\" hint-placeholder-count=\"3\">\n                  <div data-player=\"{{ l.id }}\" onclick=\"{{ openDrawer }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:11px;background:#0c0e14\">\n                    <div style=\"width:34px;height:34px;flex:none;border-radius:50%;background:{{ l.ring }};display:grid;place-items:center\"><div style=\"position:relative;width:27px;height:27px;border-radius:50%;background:#0c0e14;overflow:hidden;display:grid;place-items:center\"><img src=\"{{ l.headshot }}\" alt=\"\" referrerpolicy=\"no-referrer\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;opacity:.45\" onerror=\"this.remove()\"><span style=\"position:relative;font-family:'Space Grotesk';font-weight:700;font-size:11px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.8);letter-spacing:-.01em\">{{ l.score }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13px\">{{ l.name }} <span style=\"font-size:11px;color:#7b8597;font-weight:500\">{{ l.team }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#7b8597\">HR {{ l.modelPct }}%<\u002Fdiv>\n                    <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:13px;color:var(--ac,#ff8a4c)\">{{ l.odds }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin-top:18px;padding:12px 15px;border-radius:11px;background:rgba(53,208,192,.05);border:1px solid rgba(53,208,192,.16);font-size:12px;color:#8b94a6;line-height:1.55\">Kelly sizing assumes your model probabilities are accurate. Fractional Kelly (¼) hedges against model error — the safer choice. Never stake more than you can lose; the solver caps total exposure but variance is real.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ solver.hasBets }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:none\"><\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ solver.noBets }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:40px 20px;text-align:center\">\n            <div style=\"margin-bottom:12px;display:flex;justify-content:center;opacity:.55\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7b8597\" stroke-width=\"1.6\" stroke-linecap=\"round\"><path d=\"M5 20V10M12 20V4M19 20v-7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk';font-size:18px;font-weight:700;color:#c3cad6\">No +EV plays clear the bar tonight<\u002Fdiv>\n            <p style=\"margin:8px auto 0;font-size:13.5px;color:#7b8597;max-width:400px\">At this risk profile the model finds no bets with positive Kelly value. Loosening to \"Aggressive\" widens the band — or there's simply no edge on tonight's prices. Discipline is a position too.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- HEDGE -->\n      <sc-if value=\"{{ isHedge }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:#ffc24d;font-weight:700;margin-bottom:6px\">ROUND-ROBIN HEDGE<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Mix &amp; match — any two dingers win<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:680px\">Pick up to 5 bats and we build every 2-leg parlay between them — 5 bats makes 10 bets. You don't need a specific pair: <b style=\"color:#c3cad6\">any two of your hitters going deep<\u002Fb> cashes a parlay, and most pairs pay more than the whole card costs.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:11px;align-items:flex-start;background:rgba(255,194,77,.08);border:1px solid rgba(255,194,77,.28);border-radius:13px;padding:13px 15px;margin-bottom:20px\">\n          <span style=\"font-size:16px;line-height:1.3\">⚠️<\u002Fspan>\n          <div style=\"font-size:12.5px;color:#d8cfa8;line-height:1.5\">No bet guarantees a green day — this needs <b style=\"color:#ffc24d\">two of your bats to homer<\u002Fb> (if zero or one do, the card loses). But two HRs from a 5-man pool is far likelier than nailing one exact pair — that's the edge. The all-miss downside is shown below.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;margin-bottom:22px\">\n          <div>\n            <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">STAKE PER BET<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;padding:9px 13px;border-radius:11px;background:#0c0e14;border:2px solid rgba(255,194,77,.35)\">\n              <span style=\"font-size:16px;font-weight:700;color:#9aa3b2;margin-right:4px\">$<\u002Fspan>\n              <input type=\"text\" inputmode=\"decimal\" value=\"{{ rrStake }}\" oninput=\"{{ setRRStake }}\" placeholder=\"10\" style=\"width:90px;background:transparent;border:none;color:#eef1f6;font-family:'Space Grotesk';font-weight:700;font-size:18px;outline:none\">\n            <\u002Fdiv>\n            <div style=\"margin-top:7px;font-size:11px;color:#7b8597\">same stake on each 2-leg parlay<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">YOUR CARD<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:11px;background:#0c0e14;border:1px solid rgba(255,255,255,.1)\">\n              <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--ac,#ff8a4c)\">{{ rr.selCount }}<\u002Fspan><span style=\"font-size:12px;color:#7b8597\">bats<\u002Fspan>\n              <span style=\"color:#5f6878\">→<\u002Fspan>\n              <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px\">{{ rr.betCount }}<\u002Fspan><span style=\"font-size:12px;color:#7b8597\">bets<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:7px;font-size:11px\"><button onclick=\"{{ resetRR }}\" style=\"background:none;border:none;color:#ffc24d;cursor:pointer;font-family:'Hanken Grotesk';font-weight:600;font-size:11.5px;padding:0\">↺ Auto-pick top 5<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ rr.synthetic }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"max-width:230px;font-size:11.5px;color:#ffc24d;line-height:1.45;padding-top:22px\">Using model-fair prices — connect odds in Tools for live book numbers.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ rr.reason }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:34px 20px;text-align:center;font-size:13.5px;color:#7b8597\">{{ rr.reason }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ rr.enough }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><span style=\"width:3px;height:17px;border-radius:2px;background:var(--ac,#ff8a4c);flex:none\"><\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:18px;font-weight:700\">1 · Pick your bats <span style=\"font-size:12px;color:#7b8597;font-weight:500\">— tap up to 5<\u002Fspan><\u002Fh2><\u002Fdiv>\n          <div data-mcol2=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:10px;margin-bottom:26px\">\n            <sc-for list=\"{{ rr.pickers }}\" as=\"p\" hint-placeholder-count=\"10\">\n              <button data-rrid=\"{{ p.id }}\" onclick=\"{{ toggleRR }}\" style=\"display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:13px;cursor:pointer;text-align:left;background:{{ p.cardBg }};border:1px solid {{ p.cardBorder }};transition:background .14s,border-color .14s\">\n                <div style=\"width:38px;height:38px;flex:none;border-radius:50%;background:{{ p.ring }};display:grid;place-items:center\"><div style=\"position:relative;width:30px;height:30px;border-radius:50%;background:#0c0e14;overflow:hidden;display:grid;place-items:center\"><img src=\"{{ p.headshot }}\" alt=\"\" referrerpolicy=\"no-referrer\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center\" onerror=\"this.remove()\"><span style=\"position:relative;font-family:'Space Grotesk';font-weight:700;font-size:11px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9)\">{{ p.score }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fdiv><div style=\"font-size:11px;color:#7b8597\">{{ p.team }} · HR {{ p.hitPct }} · {{ p.odds }}<\u002Fdiv><\u002Fdiv>\n                <span style=\"width:22px;height:22px;flex:none;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;background:{{ p.markBg }};color:{{ p.markFg }}\">{{ p.mark }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ rr.tooFew }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#13161e;border:1px solid rgba(255,194,77,.25);border-radius:14px;padding:16px;font-size:13px;color:#ffc24d\">Pick at least 2 bats to build a round-robin.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ rr.hasBets }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><span style=\"width:3px;height:17px;border-radius:2px;background:var(--pos,#35d0c0);flex:none\"><\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:18px;font-weight:700\">2 · Your {{ rr.betCount }}-bet round-robin<\u002Fh2><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:14px\">\n              <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">BETS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:23px;font-weight:700;margin-top:3px\">{{ rr.betCount }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">TOTAL STAKED<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:23px;font-weight:700;margin-top:3px\">{{ rr.totalStaked }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">SMALLEST PAIR PAYS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:23px;font-weight:700;margin-top:3px;color:var(--pos,#35d0c0)\">{{ rr.oneCashMin }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">≥2 HR (MODEL)<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:23px;font-weight:700;margin-top:3px;color:#ffc24d\">{{ rr.ge2Pct }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 15px\"><div style=\"font-size:10.5px;color:#7b8597;font-weight:600\">MODEL EV<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:23px;font-weight:700;margin-top:3px;color:{{ rr.evColor }}\">{{ rr.evLabel }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:#13161e;border:1px solid rgba(53,208,192,.18);border-radius:14px;padding:14px 16px;margin-bottom:18px;font-size:13px;color:#c3cad6;line-height:1.55\">{{ rr.anyTwoNote }} The smallest pair returns <b>{{ rr.oneCashMin }}<\u002Fb> against <b>{{ rr.totalStaked }}<\u002Fb> total risk — net <b style=\"color:{{ rr.netOneMinColor }}\">{{ rr.netOneMin }}<\u002Fb> if only that one pair lands. Longer-odds pairs and every extra HR only add to it.<\u002Fdiv>\n\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;margin-bottom:18px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#0f1218;font-size:11px;color:#7b8597;font-weight:600;letter-spacing:.03em\"><span>2-LEG PARLAY<\u002Fspan><span>STAKE → PAYS<\u002Fspan><\u002Fdiv>\n              <sc-for list=\"{{ rr.combos }}\" as=\"c\" hint-placeholder-count=\"10\">\n                <div style=\"display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.05)\">\n                  <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.aName }} <span style=\"color:#5f6878;font-weight:500\">+<\u002Fspan> {{ c.bName }}<\u002Fdiv><div style=\"font-size:11px;color:#7b8597;margin-top:2px\">{{ c.aTeam }} · {{ c.bTeam }} · both HR {{ c.winPct }} · {{ c.odds }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"text-align:right;min-width:96px\"><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:13.5px\">{{ c.stake }} <span style=\"color:var(--pos,#35d0c0)\">→ {{ c.payout }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                  <button data-combo=\"{{ c.idx }}\" onclick=\"{{ addComboToSlip }}\" style=\"flex:none;padding:8px 12px;border-radius:9px;cursor:pointer;font-family:'Hanken Grotesk';font-weight:700;font-size:11.5px;color:#0a0c11;background:var(--ac,#ff8a4c)\" style-hover=\"filter:brightness(1.07)\">+ Slip<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:6px 16px 12px;margin-bottom:6px\">\n              <div style=\"font-size:10.5px;color:#7b8597;font-weight:600;letter-spacing:.03em;padding:11px 0 6px\">COVERAGE — HOW MANY OF YOUR BATS HOMER<\u002Fdiv>\n              <sc-for list=\"{{ rr.scenarios }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px solid rgba(255,255,255,.05);font-size:12.5px\"><span style=\"color:#c3cad6;font-weight:600\">{{ s.homers }}<\u002Fspan><span style=\"color:var(--pos,#35d0c0);font-weight:600\">{{ s.cashes }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#7b8597;line-height:1.5\">Each <b style=\"color:#9aa3b2\">+ Slip<\u002Fb> loads that pair as a 2-leg parlay — place them as separate bets. If 0 or 1 of your bats homers, the card loses your {{ rr.totalStaked }}.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- REPORT CARD -->\n      <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">MODEL REPORT CARD<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Does the model actually work?<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:640px\">Every prediction is logged and graded against real box scores — no cherry-picking. When the model says 20%, do players actually homer 20% of the time? Here's the honest answer.<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- Not enough data yet -->\n        <sc-if value=\"{{ report.notEnough }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:34px 22px;text-align:center\">\n          <div style=\"margin-bottom:14px;display:flex;justify-content:center;opacity:.6\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7b8597\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 18l5-5 4 3 7-8\"><\u002Fpath><path d=\"M16 8h4v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-size:19px;font-weight:700;color:#c3cad6\">Building your track record<\u002Fdiv>\n          <p style=\"margin:10px auto 18px;font-size:13.5px;color:#7b8597;max-width:440px;line-height:1.6\">The report card grades real predictions as games finalize — it can't be faked with a backtest you didn't run. <strong style=\"color:#9aa3b2\">{{ report.locked }} predictions locked today<\u002Fstrong>; calibration populates as tonight's bats finish and accumulates each day you check in.<\u002Fp>\n          <div style=\"display:inline-flex;gap:22px;padding:14px 22px;border-radius:13px;background:#0c0e14;border:1px solid rgba(255,255,255,.07)\">\n            <div><div style=\"font-family:'Space Grotesk';font-size:22px;font-weight:700\">{{ report.locked }}<\u002Fdiv><div style=\"font-size:11px;color:#7b8597\">locked today<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:rgba(255,255,255,.08)\"><\u002Fdiv>\n            <div><div style=\"font-family:'Space Grotesk';font-size:22px;font-weight:700\">{{ report.sample }}<\u002Fdiv><div style=\"font-size:11px;color:#7b8597\">graded so far<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:rgba(255,255,255,.08)\"><\u002Fdiv>\n            <div><div style=\"font-family:'Space Grotesk';font-size:22px;font-weight:700\">{{ report.daysWithData }}<\u002Fdiv><div style=\"font-size:11px;color:#7b8597\">days tracked<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Full report -->\n        <sc-if value=\"{{ report.enough }}\" hint-placeholder-val=\"{{ false }}\">\n          <!-- Verdict hero -->\n          <div style=\"background:linear-gradient(135deg,rgba(53,208,192,.07),transparent);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:20px 22px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap\">\n            <div style=\"flex:1;min-width:220px\">\n              <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.06em;margin-bottom:6px\">VERDICT<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk';font-size:26px;font-weight:700;color:{{ report.verdict.col }}\">{{ report.verdict.txt }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:#8b94a6;margin-top:5px\">{{ report.verdict.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:22px\">\n              <div style=\"text-align:center\"><div style=\"font-family:'Space Grotesk';font-size:24px;font-weight:700;color:{{ report.skillColor }}\">{{ report.skill }}<\u002Fdiv><div style=\"font-size:10.5px;color:#7b8597;font-weight:600;margin-top:2px\">SKILL vs NAIVE<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:center\"><div style=\"font-family:'Space Grotesk';font-size:24px;font-weight:700\">±{{ report.calErr }}<\u002Fdiv><div style=\"font-size:10.5px;color:#7b8597;font-weight:600;margin-top:2px\">CALIB. ERROR<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:center\"><div style=\"font-family:'Space Grotesk';font-size:24px;font-weight:700\">{{ report.sample }}<\u002Fdiv><div style=\"font-size:10.5px;color:#7b8597;font-weight:600;margin-top:2px\">PREDICTIONS<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Calibration chart -->\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:16px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px\"><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:17px;font-weight:700\">Calibration curve<\u002Fh2>\n              <div style=\"display:flex;gap:14px;font-size:11px\"><span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:10px;height:10px;border-radius:2px;background:#5f6878\"><\u002Fspan>Predicted<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:10px;height:10px;border-radius:2px;background:var(--ac,#ff8a4c)\"><\u002Fspan>Actual<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"margin:0 0 16px;font-size:12.5px;color:#7b8597\">Bars matching = the model's probabilities are true. Each pair is a probability range.<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:end;height:180px\">\n              <sc-for list=\"{{ report.buckets }}\" as=\"b\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:6px\">\n                  <div style=\"display:flex;align-items:flex-end;gap:5px;height:130px;width:100%;justify-content:center\">\n                    <div style=\"width:28%;height:{{ b.predH }}%;min-height:3px;background:#5f6878;border-radius:4px 4px 0 0\" title=\"predicted\"><\u002Fdiv>\n                    <div style=\"width:28%;height:{{ b.actH }}%;min-height:3px;background:var(--ac,#ff8a4c);border-radius:4px 4px 0 0\" title=\"actual\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px;font-weight:700;color:{{ b.diffColor }}\">{{ b.predPct }}→{{ b.actPct }}<\u002Fdiv>\n                  <div style=\"font-size:10.5px;color:#7b8597\">{{ b.label }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#5f6878\">n={{ b.n }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Brier + factor audit -->\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px\">\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px\">\n              <h2 style=\"margin:0 0 4px;font-family:'Space Grotesk';font-size:17px;font-weight:700\">Skill score<\u002Fh2>\n              <p style=\"margin:0 0 16px;font-size:12.5px;color:#7b8597\">Brier score (lower = better). Skill % is how much the model beats just guessing the league base rate.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:11px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-radius:11px;background:#0c0e14\"><span style=\"font-size:13px;color:#c3cad6\">Model Brier<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:16px\">{{ report.brierModel }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-radius:11px;background:#0c0e14\"><span style=\"font-size:13px;color:#c3cad6\">Naive (base rate)<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:16px;color:#7b8597\">{{ report.brierNaive }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;align-items:center;padding:13px;border-radius:11px;background:rgba(53,208,192,.07);border:1px solid rgba(53,208,192,.18)\"><span style=\"font-size:13px;font-weight:700;color:#c3cad6\">Skill vs naive<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px;color:{{ report.skillColor }}\">{{ report.skill }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ report.hasFactors }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px\">\n              <h2 style=\"margin:0 0 4px;font-family:'Space Grotesk';font-size:17px;font-weight:700\">Do the signals work?<\u002Fh2>\n              <p style=\"margin:0 0 16px;font-size:12.5px;color:#7b8597\">Auditing the model's own badges — did flagged players actually outperform their predicted rate?<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <sc-for list=\"{{ report.factors }}\" as=\"f\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;background:#0c0e14\">\n                    <div><div style=\"font-size:13px;font-weight:600\">{{ f.name }}<\u002Fdiv><div style=\"font-size:11px;color:#7b8597;margin-top:2px\">{{ f.predPct }} pred → {{ f.actPct }} actual · n={{ f.n }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px;color:{{ f.liftColor }}\">{{ f.lift }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;padding:12px 15px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);font-size:12px;color:#8b94a6;line-height:1.55\">Grades come from {{ report.daysWithData }} day(s) of finalized games · {{ report.sample }} predictions · {{ report.baseRate }} overall HR rate. The more days you check in, the sharper this gets.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DATA -->\n      <sc-if value=\"{{ isData }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">DATA INTELLIGENCE<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Player-market feature store<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:600px\">Every qualified hitter as a model-ready row — season power, regressed HR rate, park &amp; matchup adjustment, and Dinger Score.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:18px\">\n          <div style=\"padding:12px 16px;border-radius:13px;background:#13161e;border:1px solid rgba(255,255,255,.07)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">ROWS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:22px;font-weight:700\">{{ dataCount }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:12px 16px;border-radius:13px;background:#13161e;border:1px solid rgba(255,255,255,.07)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">SOURCE<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:22px;font-weight:700\">{{ dataSource }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:12px 16px;border-radius:13px;background:#13161e;border:1px solid rgba(255,255,255,.07)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">SEASON<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:22px;font-weight:700\">{{ seasonYr }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <button style=\"padding:9px 14px;border:1px solid rgba(255,255,255,.14);border-radius:10px;cursor:pointer;font-weight:600;font-size:12.5px;color:#c3cad6;background:transparent\">⬇ CSV<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden\">\n          <div style=\"overflow-x:auto\">\n          <sc-for list=\"{{ dataRows }}\" as=\"r\" hint-placeholder-count=\"10\">\n                <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13px;min-width:720px\">\n            <thead><tr style=\"background:#0c0e14;color:#7b8597;text-align:left\">\n              <th style=\"padding:11px 14px;font-weight:600;font-size:11px\">PLAYER<\u002Fth>\n              <th style=\"padding:11px 10px;font-weight:600;font-size:11px\">TEAM<\u002Fth>\n              <th style=\"padding:11px 10px;font-weight:600;font-size:11px;text-align:right\">HR/PA<\u002Fth>\n              <th style=\"padding:11px 10px;font-weight:600;font-size:11px;text-align:right\">OPS<\u002Fth>\n              <th style=\"padding:11px 10px;font-weight:600;font-size:11px;text-align:right\">MODEL%<\u002Fth>\n              <th style=\"padding:11px 10px;font-weight:600;font-size:11px;text-align:right\">PARK<\u002Fth>\n              <th style=\"padding:11px 10px;font-weight:600;font-size:11px;text-align:right\">SCORE<\u002Fth>\n              <th style=\"padding:11px 14px;font-weight:600;font-size:11px\">POWER<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody style=\"font-family:'Space Grotesk';font-variant-numeric:tabular-nums\">\n              <tr style=\"border-top:1px solid rgba(255,255,255,.05)\">\n                  <td style=\"padding:11px 14px;font-family:'Hanken Grotesk';font-weight:600\">{{ r.name }}<\u002Ftd>\n                  <td style=\"padding:11px 10px;color:#9aa3b2\">{{ r.team }}<\u002Ftd>\n                  <td style=\"padding:11px 10px;text-align:right\">{{ r.hrpa }}<\u002Ftd>\n                  <td style=\"padding:11px 10px;text-align:right;color:#9aa3b2\">{{ r.ops }}<\u002Ftd>\n                  <td style=\"padding:11px 10px;text-align:right;color:var(--pos,#35d0c0)\">{{ r.modelPct }}<\u002Ftd>\n                  <td style=\"padding:11px 10px;text-align:right\">{{ r.park }}<\u002Ftd>\n                  <td style=\"padding:11px 10px;text-align:right;color:var(--ac,#ff8a4c)\">{{ r.score }}<\u002Ftd>\n                  <td style=\"padding:11px 14px;font-family:'Hanken Grotesk';font-size:12px;color:{{ r.powerColor }}\">{{ r.power }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- LIVE -->\n      <sc-if value=\"{{ isLive }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px\">\n          <div>\n            <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">LIVE HR FEED<\u002Fdiv>\n            <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Dingers as they happen<\u002Fh1>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:10px;background:rgba(53,208,192,.08);border:1px solid rgba(53,208,192,.22)\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:var(--pos,#35d0c0);animation:dlpulse 1.6s infinite\"><\u002Fspan>\n            <span style=\"font-size:12.5px;font-weight:600;color:var(--pos,#35d0c0)\">{{ liveStatus }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasLive }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ liveHRs }}\" as=\"h\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;background:#13161e;border:1px solid {{ h.border }}\">\n                <div style=\"position:relative;width:38px;height:38px;flex:none;border-radius:50%;overflow:hidden;background:#0c0e14;display:grid;place-items:center\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--ac,#ff8a4c)\" stroke-width=\"1.6\"><circle cx=\"12\" cy=\"12\" r=\"8.5\"><\u002Fcircle><path d=\"M8 6c2 3 2 9 0 12M16 6c-2 3-2 9 0 12\"><\u002Fpath><\u002Fsvg><img src=\"{{ h.headshot }}\" alt=\"\" referrerpolicy=\"no-referrer\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center\" onerror=\"this.remove()\"><\u002Fdiv>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:15px\">{{ h.player }} <span style=\"font-size:12px;color:#7b8597;font-weight:500\">· {{ h.detail }}<\u002Fspan><\u002Fdiv><div style=\"font-size:12px;color:#8b94a6;margin-top:2px\">{{ h.line }}<\u002Fdiv><\u002Fdiv>\n                <span style=\"font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:7px;background:{{ h.tagBg }};color:{{ h.tagFg }}\">{{ h.tag }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noLive }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;padding:30px 0 16px;text-align:center;color:#7b8597;margin-bottom:22px\">\n            <div style=\"margin-bottom:12px;display:flex;justify-content:center;opacity:.55\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7b8597\" stroke-width=\"1.6\"><circle cx=\"12\" cy=\"12\" r=\"8.5\"><\u002Fcircle><path d=\"M8 6c2 3 2 9 0 12M16 6c-2 3-2 9 0 12\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk';font-size:18px;font-weight:700;color:#c3cad6\">No home runs yet<\u002Fdiv>\n            <p style=\"margin:8px 0 0;font-size:13.5px;max-width:360px\">{{ liveEmpty }}<\u002Fp>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasSchedule }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;margin-bottom:11px\">Today's schedule<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px\">\n              <sc-for list=\"{{ scheduleGames }}\" as=\"g\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-radius:12px;background:#13161e;border:1px solid rgba(255,255,255,.07)\">\n                  <div><div style=\"font-weight:700;font-size:13.5px\">{{ g.title }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">{{ g.venue }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"text-align:right\"><div style=\"font-family:'Space Grotesk';font-size:13px;font-weight:600\">{{ g.time }}<\u002Fdiv><div style=\"font-size:10.5px;color:#7b8597;margin-top:2px\">{{ g.state }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- BUILDER / TRACKING / RESEARCH / TOOLS (static design screens) -->\n      <sc-if value=\"{{ isBuilder }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n\n        <!-- PARETO FRONTIER PICKER -->\n        <sc-if value=\"{{ hasFrontier }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-bottom:34px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">RISK / REWARD FRONTIER<\u002Fdiv>\n          <h1 style=\"margin:0 0 4px;font-family:'Space Grotesk';font-size:26px;font-weight:700;letter-spacing:-.02em\">Pick your spot on the curve<\u002Fh1>\n          <p style=\"margin:0 0 16px;color:#8b94a6;font-size:13.5px;max-width:620px\">Every cross-game parlay plotted by win probability vs payout. The bright curve is the <b style=\"color:#c3cad6\">efficient frontier<\u002Fb> — slips where you can't win more without lowering your odds of winning. Drag to choose how much risk you want.<\u002Fp>\n\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px 18px 20px\">\n            <!-- Scatter plot -->\n            <div style=\"position:relative;width:100%\">\n              <svg viewBox=\"{{ frontierViewBox }}\" preserveAspectRatio=\"none\" style=\"width:100%;height:300px;display:block\">\n                <!-- axis labels -->\n                <text x=\"6\" y=\"34\" fill=\"#5f6878\" font-size=\"20\" font-family=\"Space Grotesk\">{{ frAxisYTop }}<\u002Ftext>\n                <text x=\"6\" y=\"362\" fill=\"#5f6878\" font-size=\"20\" font-family=\"Space Grotesk\">{{ frAxisYBot }}<\u002Ftext>\n                <text x=\"96\" y=\"412\" fill=\"#5f6878\" font-size=\"20\" font-family=\"Space Grotesk\">{{ frAxisXLeft }} win<\u002Ftext>\n                <text x=\"800\" y=\"412\" fill=\"#5f6878\" font-size=\"20\" font-family=\"Space Grotesk\">{{ frAxisXRight }} win<\u002Ftext>\n                <!-- all combos (faint) -->\n                <sc-for list=\"{{ frontierAllPts }}\" as=\"pt\" hint-placeholder-count=\"40\">\n                  <circle cx=\"{{ pt.cx }}\" cy=\"{{ pt.cy }}\" r=\"{{ pt.r }}\" fill=\"{{ pt.fill }}\"><\u002Fcircle>\n                <\u002Fsc-for>\n                <!-- frontier line -->\n                <polyline points=\"{{ frontierLine }}\" fill=\"none\" stroke=\"rgba(53,208,192,.5)\" stroke-width=\"2.5\" stroke-dasharray=\"2 6\" stroke-linecap=\"round\"><\u002Fpolyline>\n                <!-- frontier points -->\n                <sc-for list=\"{{ frontierPts }}\" as=\"pt\" hint-placeholder-count=\"6\">\n                  <circle cx=\"{{ pt.cx }}\" cy=\"{{ pt.cy }}\" r=\"{{ pt.r }}\" fill=\"{{ pt.fill }}\" stroke=\"{{ pt.stroke }}\" stroke-width=\"2.5\"><\u002Fcircle>\n                <\u002Fsc-for>\n              <\u002Fsvg>\n            <\u002Fdiv>\n\n            <!-- Risk slider -->\n            <div style=\"display:flex;align-items:center;gap:14px;margin-top:8px;padding:0 2px\">\n              <span style=\"font-size:11px;font-weight:700;color:var(--pos,#35d0c0);letter-spacing:.04em;flex:none\">◀ SAFE<\u002Fspan>\n              <input type=\"range\" min=\"0\" max=\"{{ frontierMax }}\" value=\"{{ frontierIdx }}\" oninput=\"{{ setFrontierIdx }}\" style=\"flex:1;accent-color:#ff8a4c;height:6px;cursor:pointer\">\n              <span style=\"font-size:11px;font-weight:700;color:var(--ac,#ff8a4c);letter-spacing:.04em;flex:none\">MAX PAYOUT ▶<\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- Selected parlay -->\n            <div style=\"margin-top:18px;border-top:1px solid rgba(255,255,255,.07);padding-top:16px\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:0;border:1px solid rgba(255,255,255,.07);border-radius:13px;overflow:hidden;margin-bottom:14px\">\n                <div style=\"flex:1;min-width:88px;padding:12px 14px;border-right:1px solid rgba(255,255,255,.06)\">\n                  <div style=\"font-size:10px;color:#7b8597;font-weight:700;letter-spacing:.04em\">PROFILE<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:17px;font-weight:700;margin-top:3px;color:{{ frRiskColor }}\">{{ frRiskLabel }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#7b8597;margin-top:1px\">{{ frSelLegCount }} legs<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:88px;padding:12px 14px;border-right:1px solid rgba(255,255,255,.06)\">\n                  <div style=\"font-size:10px;color:#7b8597;font-weight:700;letter-spacing:.04em\">WIN%<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:20px;font-weight:700;margin-top:3px;color:var(--pos,#35d0c0)\">{{ frSelWin }}%<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:88px;padding:12px 14px;border-right:1px solid rgba(255,255,255,.06)\">\n                  <div style=\"font-size:10px;color:#7b8597;font-weight:700;letter-spacing:.04em\">$10 PAYS<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:20px;font-weight:700;margin-top:3px;color:var(--ac,#ff8a4c)\">{{ frSelPayout }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:88px;padding:12px 14px;border-right:1px solid rgba(255,255,255,.06)\">\n                  <div style=\"font-size:10px;color:#7b8597;font-weight:700;letter-spacing:.04em\">EV<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:20px;font-weight:700;margin-top:3px;color:{{ frSelEvColor }}\">{{ frSelEv }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:none;padding:12px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n                  <div style=\"font-size:10px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:2px\">GRADE<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:24px;font-weight:700;color:{{ frSelGradeColor }}\">{{ frSelGrade }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:14px\">\n                <sc-for list=\"{{ frSelLegs }}\" as=\"l\" hint-placeholder-count=\"3\">\n                  <div data-player=\"{{ l.id }}\" onclick=\"{{ openDrawer }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:11px;background:#0c0e14;border:1px solid rgba(255,255,255,.06)\">\n                    <div style=\"width:38px;height:38px;flex:none;border-radius:50%;background:{{ l.ring }};display:grid;place-items:center\"><div style=\"width:29px;height:29px;border-radius:50%;background:#0c0e14;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px\">{{ l.score }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\"><div style=\"font-weight:700;font-size:14px\">{{ l.name }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:1px\">{{ l.team }} vs {{ l.opp }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:right\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">HR%<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px\">{{ l.modelPct }}%<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:right;min-width:48px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">ODDS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--ac,#ff8a4c)\">{{ l.odds }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <button onclick=\"{{ addFrontierToSlip }}\" style=\"width:100%;padding:12px;border:none;border-radius:11px;cursor:pointer;font-family:'Hanken Grotesk';font-weight:800;font-size:14px;color:#0a0c11;background:var(--ac,#ff8a4c)\" style-hover=\"filter:brightness(1.08)\">+ Add this slip to bet slip<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border-top:1px solid rgba(255,255,255,.07);margin-bottom:30px\"><\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- WIN RATE OPTIMIZER -->\n        <div style=\"margin-bottom:32px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--pos,#35d0c0);font-weight:700;margin-bottom:6px\">WIN RATE OPTIMIZER<\u002Fdiv>\n          <h1 style=\"margin:0 0 4px;font-family:'Space Grotesk';font-size:26px;font-weight:700;letter-spacing:-.02em\">Best parlay for your leg count<\u002Fh1>\n          <p style=\"margin:0 0 18px;color:#8b94a6;font-size:13.5px;max-width:600px\">True win probability = product of each leg's model probability. Fewer legs of stronger players beats more legs at longer odds — every time.<\u002Fp>\n\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:20px\">\n            <div>\n              <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">LEGS<\u002Fdiv>\n              <div style=\"display:flex;gap:5px\">\n                <sc-for list=\"{{ wroLegBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n                  <button data-legs=\"{{ b.n }}\" onclick=\"{{ wroSetLegs }}\" style=\"width:38px;height:38px;display:grid;place-items:center;border-radius:9px;font-family:'Space Grotesk';font-weight:700;font-size:15px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:{{ b.bg }};color:{{ b.fg }}\">{{ b.n }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">OPTIMIZE FOR<\u002Fdiv>\n              <div style=\"display:flex;gap:5px\">\n                <sc-for list=\"{{ wroModeBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n                  <button data-mode=\"{{ b.m }}\" onclick=\"{{ wroSetMode }}\" style=\"padding:9px 13px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:{{ b.bg }};color:{{ b.fg }}\">{{ b.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ wro }}\" hint-placeholder-val=\"{{ true }}\">\n            <!-- Result card -->\n            <div style=\"background:#13161e;border:1px solid rgba(53,208,192,.22);border-radius:18px;overflow:hidden\">\n              <!-- Stats bar -->\n              <div style=\"display:flex;flex-wrap:wrap;gap:0;border-bottom:1px solid rgba(255,255,255,.07)\">\n                <div style=\"flex:1;min-width:100px;padding:14px 18px;border-right:1px solid rgba(255,255,255,.06)\">\n                  <div style=\"font-size:10.5px;color:#7b8597;font-weight:700;letter-spacing:.04em\">TRUE WIN%<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:24px;font-weight:700;margin-top:4px;color:var(--pos,#35d0c0)\">{{ wro.winPct }}%<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#7b8597;margin-top:2px\">our model<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:100px;padding:14px 18px;border-right:1px solid rgba(255,255,255,.06)\">\n                  <div style=\"font-size:10.5px;color:#7b8597;font-weight:700;letter-spacing:.04em\">MARKET WIN%<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:24px;font-weight:700;margin-top:4px\">{{ wro.marketWinDisplay }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#7b8597;margin-top:2px\">implied by odds<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:100px;padding:14px 18px;border-right:1px solid rgba(255,255,255,.06)\">\n                  <div style=\"font-size:10.5px;color:#7b8597;font-weight:700;letter-spacing:.04em\">PARLAY EV<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:24px;font-weight:700;margin-top:4px;color:{{ wro.parleyEvColor }}\">{{ wro.parleyEvDisplay }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#7b8597;margin-top:2px\">expected return<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:100px;padding:14px 18px;border-right:1px solid rgba(255,255,255,.06)\">\n                  <div style=\"font-size:10.5px;color:#7b8597;font-weight:700;letter-spacing:.04em\">COMBINED ODDS<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:24px;font-weight:700;margin-top:4px;color:var(--ac,#ff8a4c)\">{{ wro.comboAm }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#7b8597;margin-top:2px\">to win on $10<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:none;padding:14px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:70px\">\n                  <div style=\"font-size:10.5px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:4px\">GRADE<\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk';font-size:28px;font-weight:700;color:{{ wro.gradeColor }}\">{{ wro.grade }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- Warnings -->\n              <sc-if value=\"{{ wro.warnLow }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:10px 18px;background:rgba(255,194,77,.08);border-bottom:1px solid rgba(255,194,77,.15);font-size:12.5px;color:#ffc24d\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-2px;margin-right:5px\"><path d=\"M12 3l9 16H3z\"><\u002Fpath><path d=\"M12 10v4M12 17h.01\"><\u002Fpath><\u002Fsvg>True win probability below 1% — consider dropping to fewer legs or targeting higher-probability plays.<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ wro.warnEv }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:10px 18px;background:rgba(255,107,107,.08);border-bottom:1px solid rgba(255,107,107,.15);font-size:12.5px;color:#ff8d8d\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-2px;margin-right:5px\"><path d=\"M12 3l9 16H3z\"><\u002Fpath><path d=\"M12 10v4M12 17h.01\"><\u002Fpath><\u002Fsvg>Negative expected value — the book has edge here. Switching to Best EV mode may find better-priced legs.<\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- Legs -->\n              <div style=\"padding:16px 18px 10px;display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{ wro.legs }}\" as=\"l\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:#0c0e14;border:{{ l.cardBorder }}\">\n                    <div data-player=\"{{ l.id }}\" onclick=\"{{ openDrawer }}\" style=\"cursor:pointer;width:44px;height:44px;flex:none;border-radius:50%;background:{{ l.ring }};display:grid;place-items:center\">\n                      <div style=\"position:relative;width:36px;height:36px;border-radius:50%;background:#0c0e14;overflow:hidden;display:grid;place-items:center\">\n                        <img src=\"{{ l.headshot }}\" alt=\"\" referrerpolicy=\"no-referrer\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;opacity:.45\" onerror=\"this.remove()\">\n                        <span style=\"position:relative;font-family:'Space Grotesk';font-weight:700;font-size:14px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.8);letter-spacing:-.01em\">{{ l.score }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"font-weight:700;font-size:14px\">{{ l.name }}<\u002Fdiv>\n                      <div style=\"font-size:12px;color:#7b8597;margin-top:2px\">{{ l.team }} vs {{ l.opp }} · {{ l.why }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"text-align:center;min-width:50px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">HR%<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px\">{{ l.modelPct }}%<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:center;min-width:46px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">ODDS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--ac,#ff8a4c)\">{{ l.odds }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:center;min-width:44px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">EV<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:{{ l.evColor }}\">{{ l.ev }}<\u002Fdiv><\u002Fdiv>\n                    <button data-lockid=\"{{ l.id }}\" onclick=\"{{ wroToggleLock }}\" style=\"width:32px;height:32px;flex:none;border-radius:8px;border:1px solid {{ l.lockBg }};background:{{ l.lockBg }};cursor:pointer;font-size:14px;color:{{ l.lockColor }}\">{{ l.lockIcon }}<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <!-- Next / Reset row -->\n              <div style=\"display:flex;gap:8px;padding:10px 18px;border-top:1px solid rgba(255,255,255,.05)\">\n                <button onclick=\"{{ wroNext }}\" style=\"flex:1;padding:9px;border:1px solid rgba(255,255,255,.12);border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;color:#eef1f6;background:transparent\">⟳ Next combo<\u002Fbutton>\n                <button onclick=\"{{ wroReset }}\" style=\"padding:9px 14px;border:1px solid rgba(255,255,255,.08);border-radius:10px;cursor:pointer;font-weight:600;font-size:12.5px;color:#7b8597;background:transparent\">↩ Best<\u002Fbutton>\n                <span style=\"display:flex;align-items:center;font-size:11.5px;color:#5f6878;padding:0 6px\">combo #{{ wroSeed }}<\u002Fspan>\n              <\u002Fdiv>\n\n              <!-- Win probability education -->\n              <div style=\"padding:12px 18px 16px;border-top:1px solid rgba(255,255,255,.05)\">\n                <div style=\"font-size:11.5px;color:#7b8597;line-height:1.6\">True win probability = <span style=\"color:#eef1f6\">{{ wro.winFormula }}<\u002Fspan>. Assumes full independence (cross-game legs only). <span style=\"color:#ffc24d\">Add all to slip →<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:8px;margin-top:12px\">\n                  <button onclick=\"{{ addWroToSlip }}\" style=\"flex:1;padding:11px;border:none;border-radius:11px;cursor:pointer;font-weight:800;font-size:14px;color:#0a0c11;background:var(--pos,#35d0c0)\">+ Add all legs to slip<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"border-top:1px solid rgba(255,255,255,.07);margin-bottom:28px\"><\u002Fdiv>\n\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">CROSS PLAY BUILDER<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Build cross-game slips<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:560px\">Legs across different games stay near-independent — higher true win probability than a same-game parlay. Built from today's model board.<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- ULX HR PARLAY BUILDER -->\n        <sc-if value=\"{{ hasUlx }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:linear-gradient(165deg,#15181f,#101319);border:1px solid {{ ulxGateBorder }};border-radius:18px;padding:18px;margin-bottom:24px;box-shadow:0 10px 40px rgba(0,0,0,.3)\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:16px\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <div style=\"width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:22px;background:linear-gradient(150deg,#ff8a4c,#ff4d7d);box-shadow:0 6px 18px rgba(255,77,125,.3)\">🧬<\u002Fdiv>\n              <div>\n                <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:-.01em\">ULX HR Parlay<\u002Fdiv>\n                <div style=\"font-size:12px;color:#8b94a6\">Roles, not names — one Anchor, one Value, one Longshot<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:9px\">\n              <d
