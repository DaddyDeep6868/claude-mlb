{{ wro.gradeColor }}\">{{ wro.grade }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- Warnings -->\n              <sc-if value=\"{{ wro.warnLow }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:10px 18px;background:rgba(255,194,77,.08);border-bottom:1px solid rgba(255,194,77,.15);font-size:12.5px;color:#ffc24d\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-2px;margin-right:5px\"><path d=\"M12 3l9 16H3z\"><\u002Fpath><path d=\"M12 10v4M12 17h.01\"><\u002Fpath><\u002Fsvg>True win probability below 1% — consider dropping to fewer legs or targeting higher-probability plays.<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ wro.warnEv }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:10px 18px;background:rgba(255,107,107,.08);border-bottom:1px solid rgba(255,107,107,.15);font-size:12.5px;color:#ff8d8d\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-2px;margin-right:5px\"><path d=\"M12 3l9 16H3z\"><\u002Fpath><path d=\"M12 10v4M12 17h.01\"><\u002Fpath><\u002Fsvg>Negative expected value — the book has edge here. Switching to Best EV mode may find better-priced legs.<\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- Legs -->\n              <div style=\"padding:16px 18px 10px;display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{ wro.legs }}\" as=\"l\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:#0c0e14;border:{{ l.cardBorder }}\">\n                    <div data-player=\"{{ l.id }}\" onclick=\"{{ openDrawer }}\" style=\"cursor:pointer;width:44px;height:44px;flex:none;border-radius:50%;background:{{ l.ring }};display:grid;place-items:center\">\n                      <div style=\"position:relative;width:36px;height:36px;border-radius:50%;background:#0c0e14;overflow:hidden;display:grid;place-items:center\">\n                        <img src=\"{{ l.headshot }}\" alt=\"\" referrerpolicy=\"no-referrer\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;opacity:.45\" onerror=\"this.remove()\">\n                        <span style=\"position:relative;font-family:'Space Grotesk';font-weight:700;font-size:14px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.8);letter-spacing:-.01em\">{{ l.score }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"font-weight:700;font-size:14px\">{{ l.name }}<\u002Fdiv>\n                      <div style=\"font-size:12px;color:#7b8597;margin-top:2px\">{{ l.team }} vs {{ l.opp }} · {{ l.why }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"text-align:center;min-width:50px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">HR%<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px\">{{ l.modelPct }}%<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:center;min-width:46px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">ODDS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--ac,#ff8a4c)\">{{ l.odds }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:center;min-width:44px\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">EV<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14px;color:{{ l.evColor }}\">{{ l.ev }}<\u002Fdiv><\u002Fdiv>\n                    <button data-lockid=\"{{ l.id }}\" onclick=\"{{ wroToggleLock }}\" style=\"width:32px;height:32px;flex:none;border-radius:8px;border:1px solid {{ l.lockBg }};background:{{ l.lockBg }};cursor:pointer;font-size:14px;color:{{ l.lockColor }}\">{{ l.lockIcon }}<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <!-- Next / Reset row -->\n              <div style=\"display:flex;gap:8px;padding:10px 18px;border-top:1px solid rgba(255,255,255,.05)\">\n                <button onclick=\"{{ wroNext }}\" style=\"flex:1;padding:9px;border:1px solid rgba(255,255,255,.12);border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;color:#eef1f6;background:transparent\">⟳ Next combo<\u002Fbutton>\n                <button onclick=\"{{ wroReset }}\" style=\"padding:9px 14px;border:1px solid rgba(255,255,255,.08);border-radius:10px;cursor:pointer;font-weight:600;font-size:12.5px;color:#7b8597;background:transparent\">↩ Best<\u002Fbutton>\n                <span style=\"display:flex;align-items:center;font-size:11.5px;color:#5f6878;padding:0 6px\">combo #{{ wroSeed }}<\u002Fspan>\n              <\u002Fdiv>\n\n              <!-- Win probability education -->\n              <div style=\"padding:12px 18px 16px;border-top:1px solid rgba(255,255,255,.05)\">\n                <div style=\"font-size:11.5px;color:#7b8597;line-height:1.6\">True win probability = <span style=\"color:#eef1f6\">{{ wro.winFormula }}<\u002Fspan>. Assumes full independence (cross-game legs only). <span style=\"color:#ffc24d\">Add all to slip →<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:8px;margin-top:12px\">\n                  <button onclick=\"{{ addWroToSlip }}\" style=\"flex:1;padding:11px;border:none;border-radius:11px;cursor:pointer;font-weight:800;font-size:14px;color:#0a0c11;background:var(--pos,#35d0c0)\">+ Add all legs to slip<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"border-top:1px solid rgba(255,255,255,.07);margin-bottom:28px\"><\u002Fdiv>\n\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">CROSS PLAY BUILDER<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Build cross-game slips<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:560px\">Legs across different games stay near-independent — higher true win probability than a same-game parlay. Built from today's model board.<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- ULX HR PARLAY BUILDER -->\n        <sc-if value=\"{{ hasUlx }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:linear-gradient(165deg,#15181f,#101319);border:1px solid {{ ulxGateBorder }};border-radius:18px;padding:18px;margin-bottom:24px;box-shadow:0 10px 40px rgba(0,0,0,.3)\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:16px\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <div style=\"width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:22px;background:linear-gradient(150deg,#ff8a4c,#ff4d7d);box-shadow:0 6px 18px rgba(255,77,125,.3)\">🧬<\u002Fdiv>\n              <div>\n                <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:-.01em\">ULX HR Parlay<\u002Fdiv>\n                <div style=\"font-size:12px;color:#8b94a6\">Roles, not names — one Anchor, one Value, one Longshot<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:9px\">\n              <div style=\"display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:11px;font-family:'Space Grotesk';font-weight:700;font-size:14px;background:{{ ulxGateBg }};border:1px solid {{ ulxGateBorder }};color:{{ ulxGateFg }}\">{{ ulxGateLabel }}<\u002Fdiv>\n              <button onclick=\"{{ rerollUlx }}\" title=\"Reroll\" style=\"display:flex;align-items:center;gap:6px;padding:9px 13px;border:1px solid rgba(255,255,255,.14);border-radius:11px;cursor:pointer;font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:#c3cad6;background:transparent\" style-hover=\"border-color:var(--ac,#ff8a4c);color:#eef1f6\">⟳ Reroll<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div data-mcol1=\"\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:16px\">\n            <sc-for list=\"{{ ulxLegs }}\" as=\"l\" hint-placeholder-count=\"3\">\n              <div style=\"background:#0c0e14;border:1px solid {{ l.roleAccent }};border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:11px\">\n                <div style=\"display:flex;align-items:center;gap:8px\">\n                  <span style=\"font-size:18px\">{{ l.roleIcon }}<\u002Fspan>\n                  <div><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:13px;color:{{ l.roleColor }}\">{{ l.role }}<\u002Fdiv><div style=\"font-size:10.5px;color:#7b8597\">{{ l.roleTag }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ l.name }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#8b94a6;margin-top:1px\">{{ l.matchup }} · {{ l.arche }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                  <div><div style=\"font-size:10px;color:#7b8597;font-weight:600\">HR MODEL<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:16px\">{{ l.modelPct }}%<\u002Fdiv><\u002Fdiv>\n                  <div style=\"text-align:center\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">ODDS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:16px;color:{{ l.roleColor }}\">{{ l.oddsStr }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"text-align:right\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">EDGE<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:16px;color:{{ l.edgeColor }}\">{{ l.edgeStr }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:6px;flex-wrap:wrap;font-size:10.5px;color:#9aa3b2\">\n                  <span style=\"padding:3px 7px;border-radius:6px;background:rgba(255,255,255,.05)\">PWR {{ l.power }}<\u002Fspan>\n                  <span style=\"padding:3px 7px;border-radius:6px;background:rgba(255,255,255,.05)\">#{{ l.spot }} spot<\u002Fspan>\n                  <span style=\"padding:3px 7px;border-radius:6px;background:rgba(255,255,255,.05)\">{{ l.batLine }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:10.5px;color:#7b8597\">{{ l.env }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:2px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)\">\n                  <span style=\"font-size:10.5px;font-weight:600;color:{{ l.swapCountColor }}\">{{ l.swapCountLabel }}<\u002Fspan>\n                  <button data-legidx=\"{{ l.legIdx }}\" onclick=\"{{ swapUlxLeg }}\" title=\"Swap this leg to the next option\" style=\"display:flex;align-items:center;gap:5px;padding:6px 10px;border:1px solid rgba(255,255,255,.14);border-radius:9px;cursor:pointer;font-family:'Hanken Grotesk';font-weight:600;font-size:11.5px;color:#c3cad6;background:transparent;opacity:{{ l.swapBtnOpacity }}\" style-hover=\"border-color:{{ l.roleColor }};color:#eef1f6\">⇄ Swap<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px\">\n            <div style=\"text-align:center;padding:10px 4px;border-radius:11px;background:#0c0e14\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">PARLAY ODDS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--ac,#ff8a4c)\">{{ ulxOdds }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;padding:10px 4px;border-radius:11px;background:#0c0e14\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">MODEL WIN<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px\">{{ ulxWin }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;padding:10px 4px;border-radius:11px;background:#0c0e14\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">$10 PAYS<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--pos,#35d0c0)\">{{ ulxPayout }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;padding:10px 4px;border-radius:11px;background:#0c0e14\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">GREEN-LIGHT<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:18px;color:{{ ulxGateFg }}\">{{ ulxPassesLabel }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:11px\"><span style=\"width:3px;height:14px;border-radius:2px;background:var(--pos,#35d0c0);flex:none\"><\u002Fspan><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:13.5px\">Green-light gate · 7-of-10 to clear<\u002Fdiv><\u002Fdiv>\n          <div data-mcol1=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px\">\n            <sc-for list=\"{{ ulxChecks }}\" as=\"c\" hint-placeholder-count=\"10\">\n              <div style=\"display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;background:{{ c.rowBg }}\">\n                <span style=\"width:18px;height:18px;flex:none;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;color:#0a0c11;background:{{ c.markColor }}\">{{ c.mark }}<\u002Fspan>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-size:12.5px;font-weight:600\">{{ c.k }}<\u002Fdiv><div style=\"font-size:11px;color:#7b8597\">{{ c.detail }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n            <button onclick=\"{{ addUlxToSlip }}\" style=\"flex:1;min-width:160px;padding:12px;border:none;border-radius:11px;cursor:pointer;font-family:'Hanken Grotesk';font-weight:800;font-size:14px;color:#0a0c11;background:var(--ac,#ff8a4c)\" style-hover=\"filter:brightness(1.08)\">+ Add 3 legs to slip<\u002Fbutton>\n            <button onclick=\"{{ trackUlx }}\" style=\"flex:1;min-width:140px;padding:12px;border:1px solid rgba(255,255,255,.14);border-radius:11px;cursor:pointer;font-family:'Hanken Grotesk';font-weight:700;font-size:14px;color:#c3cad6;background:transparent\" style-hover=\"border-color:var(--pos,#35d0c0);color:#eef1f6\">Track<\u002Fbutton>\n            <span style=\"font-size:11.5px;color:#7b8597\">{{ ulxOddsMode }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noUlx }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#13161e;border:1px dashed rgba(255,255,255,.12);border-radius:16px;padding:28px;text-align:center;color:#7b8597;margin-bottom:24px\">\n          <div style=\"margin-bottom:10px;display:flex;justify-content:center;opacity:.55\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7b8597\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><path d=\"M12 3l9 5-9 5-9-5 9-5z\"><\u002Fpath><path d=\"M3 13l9 5 9-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:16px;color:#c3cad6\">ULX needs a full board<\u002Fdiv>\n          <p style=\"margin:7px 0 0;font-size:13px;max-width:380px;margin-inline:auto\">Once today's slate loads (3+ games with qualified hitters), the role-based parlay assembles here automatically.<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end;margin-bottom:22px\">\n          <div>\n            <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">LEGS<\u002Fdiv>\n            <div style=\"display:flex;gap:6px\">\n              <button data-legs=\"2\" onclick=\"{{ setBuilderLegs }}\" style=\"{{ bL2 }};width:34px;height:34px;display:grid;place-items:center;border-radius:9px;font-family:'Space Grotesk';font-weight:700;cursor:pointer\">2<\u002Fbutton>\n              <button data-legs=\"3\" onclick=\"{{ setBuilderLegs }}\" style=\"{{ bL3 }};width:34px;height:34px;display:grid;place-items:center;border-radius:9px;font-family:'Space Grotesk';font-weight:700;cursor:pointer\">3<\u002Fbutton>\n              <button data-legs=\"4\" onclick=\"{{ setBuilderLegs }}\" style=\"{{ bL4 }};width:34px;height:34px;display:grid;place-items:center;border-radius:9px;font-family:'Space Grotesk';font-weight:700;cursor:pointer\">4<\u002Fbutton>\n              <button data-legs=\"5\" onclick=\"{{ setBuilderLegs }}\" style=\"{{ bL5 }};width:34px;height:34px;display:grid;place-items:center;border-radius:9px;font-family:'Space Grotesk';font-weight:700;cursor:pointer\">5<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">STYLE<\u002Fdiv>\n            <div style=\"display:flex;gap:6px\">\n              <button data-style=\"safe\" onclick=\"{{ setBuilderStyle }}\" style=\"{{ bSafe }};padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer\">Safe<\u002Fbutton>\n              <button data-style=\"balanced\" onclick=\"{{ setBuilderStyle }}\" style=\"{{ bBal }};padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer\">Balanced<\u002Fbutton>\n              <button data-style=\"longshot\" onclick=\"{{ setBuilderStyle }}\" style=\"{{ bLong }};padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer\">Longshot<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;color:#7b8597;font-weight:700;letter-spacing:.04em;margin-bottom:7px\">MARKETS<\u002Fdiv>\n            <div style=\"display:flex;gap:6px\">\n              <button data-market=\"hr\" onclick=\"{{ setBuilderMarket }}\" style=\"{{ bHR }};padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer\">HR only<\u002Fbutton>\n              <button data-market=\"all\" onclick=\"{{ setBuilderMarket }}\" style=\"{{ bAll }};padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer\">All markets<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><span style=\"width:3px;height:18px;border-radius:2px;background:var(--ac,#ff8a4c);flex:none\"><\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:18px;font-weight:700\">Generated cross plays<\u002Fh2><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px\">\n          <sc-for list=\"{{ combos }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:16px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px\">\n                <div><div style=\"font-weight:700;font-size:15px\">{{ c.title }}<\u002Fdiv><div style=\"font-size:12px;color:#7b8597\">{{ c.sub }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:right\"><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:21px;color:var(--ac,#ff8a4c)\">{{ c.odds }}<\u002Fdiv><div style=\"font-size:11px;color:var(--pos,#35d0c0);font-weight:600\">{{ c.evLabel }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:12px\">\n                <sc-for list=\"{{ c.legs }}\" as=\"l\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:13px;padding:8px 11px;border-radius:9px;background:#0c0e14\"><span>{{ l.name }}<\u002Fspan><span style=\"color:#9aa3b2;font-family:'Space Grotesk'\">{{ l.odds }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:6px\">\n                <div style=\"text-align:center;padding:7px 4px;border-radius:9px;background:#0c0e14\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">WIN<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:13px\">{{ c.win }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;padding:7px 4px;border-radius:9px;background:#0c0e14\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">AVG<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:13px;color:var(--pos,#35d0c0)\">{{ c.avg }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;padding:7px 4px;border-radius:9px;background:#0c0e14\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">GRADE<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:13px;color:var(--ac,#ff8a4c)\">{{ c.grade }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:7px;margin-top:11px\">\n                <button data-combo=\"{{ $index }}\" onclick=\"{{ addComboLegs }}\" style=\"flex:1;padding:9px;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:12.5px;color:#0a0c11;background:var(--ac,#ff8a4c)\">+ Slip<\u002Fbutton>\n                <button data-combo=\"{{ $index }}\" onclick=\"{{ trackCombo }}\" style=\"flex:1;padding:9px;border:1px solid rgba(255,255,255,.14);border-radius:10px;cursor:pointer;font-weight:600;font-size:12.5px;color:#c3cad6;background:transparent\">Track<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isTrack }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">TRACKING &amp; CLV<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Saved plays<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:560px\">Build a slip, hit <b style=\"color:#c3cad6\">Save → Track<\u002Fb>, and every play lands here with odds, model EV and grade. Mark results to track your edge.<\u002Fp>\n          <div style=\"display:inline-flex;align-items:center;gap:8px;margin-top:13px;padding:8px 13px;border-radius:10px;background:rgba(53,208,192,.1);border:1px solid rgba(53,208,192,.25)\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:var(--pos,#35d0c0);animation:dlpulse 1.6s infinite;flex:none\"><\u002Fspan>\n            <span style=\"font-size:12.5px;font-weight:700;color:var(--pos,#35d0c0)\">Auto-grading on<\u002Fspan>\n            <span style=\"font-size:12.5px;color:#7b8597\">· pending slips settle automatically when each game goes final<\u002Fspan>\n            <sc-if value=\"{{ gradeServer }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;gap:6px;margin-left:4px;padding:3px 9px;border-radius:7px;background:rgba(255,138,76,.1);border:1px solid rgba(255,138,76,.25);font-size:11.5px;font-weight:600;color:var(--ac,#ff8a4c)\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--ac,#ff8a4c)\"><\u002Fspan>Server-verified · grades even while the app is closed<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasGraded }}\" hint-placeholder-val=\"{{ false }}\">\n          <div data-mcol2=\"\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px\">\n            <div style=\"padding:15px;border-radius:14px;background:#13161e;border:1px solid rgba(255,255,255,.07)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">WIN RATE<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:28px;font-weight:700;margin-top:5px;color:var(--pos,#35d0c0)\">{{ hitRate }}%<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">{{ winsCount }}/{{ gradedCount }} graded<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:15px;border-radius:14px;background:#13161e;border:1px solid rgba(53,208,192,.2)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">BEAT THE CLOSE<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:28px;font-weight:700;margin-top:5px;color:var(--pos,#35d0c0)\">{{ beatCloseLabel }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">CLV positive<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:15px;border-radius:14px;background:#13161e;border:1px solid rgba(53,208,192,.2)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">AVG CLV<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:28px;font-weight:700;margin-top:5px;color:var(--pos,#35d0c0)\">{{ avgClvLabel }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">prob points<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:15px;border-radius:14px;background:#13161e;border:1px solid rgba(255,255,255,.07)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">NET ROI<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:28px;font-weight:700;margin-top:5px\">${{ roi }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">on graded slips<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:15px;border-radius:14px;background:#13161e;border:1px solid rgba(255,255,255,.07)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">PENDING<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:28px;font-weight:700;margin-top:5px;color:#ffc24d\">{{ pendingCount }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">awaiting results<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:15px;border-radius:14px;background:#13161e;border:1px solid rgba(255,255,255,.07)\"><div style=\"font-size:11px;color:#7b8597;font-weight:600\">TOTAL SAVED<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:28px;font-weight:700;margin-top:5px\">{{ totalTracked }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597;margin-top:2px\">slips tracked<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ noTracked }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;text-align:center;color:#7b8597;border:1px dashed rgba(255,255,255,.1);border-radius:16px;padding:40px\">\n            <div style=\"margin-bottom:12px;display:flex;justify-content:center;opacity:.55\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7b8597\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"6\" y=\"4\" width=\"12\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M9 4V3h6v1M9 10h6M9 14h4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk';font-size:18px;font-weight:700;color:#c3cad6\">No tracked bets yet<\u002Fdiv>\n            <p style=\"margin:8px 0 0;font-size:13.5px;max-width:380px\">Save a parlay from the slip or use <b style=\"color:#c3cad6\">Track<\u002Fb> on any combo card — it saves here instantly.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ hasTracked }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ trackedList }}\" as=\"t\" hint-placeholder-count=\"3\">\n              <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px\">\n                <div style=\"display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap\">\n                  <span style=\"font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;flex:none;background:{{ t.statusBg }};color:{{ t.statusFg }}\">{{ t.statusLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ t.autoGraded }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;font-weight:700;padding:5px 8px;border-radius:20px;flex:none;align-self:center;background:rgba(255,255,255,.05);color:#7b8597\">⟳ AUTO<\u002Fspan><\u002Fsc-if>\n                  <div style=\"flex:1;min-width:180px\">\n                    <div style=\"font-weight:700;font-size:14px\">{{ t.label }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#7b8597;margin-top:2px\">{{ t.legsPreview }} · ${{ t.stake }} · {{ t.date }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ t.hasClv }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;align-self:center;background:{{ t.clvBg }};color:{{ t.clvFg }}\">{{ t.clvLabel }}<\u002Fspan>\n                  <\u002Fsc-if>\n                  <div style=\"display:flex;gap:14px;font-family:'Space Grotesk';flex-wrap:wrap\">\n                    <div style=\"text-align:center\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">ODDS<\u002Fdiv><div style=\"font-weight:700\">{{ t.odds }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:center\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">WIN<\u002Fdiv><div style=\"font-weight:700\">{{ t.win }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:center\"><div style=\"font-size:10px;color:#7b8597;font-weight:600\">EV<\u002Fdiv><div style=\"font-weight:700;color:var(--pos,#35d0c0)\">{{ t.ev }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px;margin-top:11px;align-items:center\">\n                  <button data-id=\"{{ t.id }}\" data-book=\"pikkit\" onclick=\"{{ sendToBook }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:1px solid rgba(255,138,76,.3);border-radius:9px;cursor:pointer;font-weight:700;font-size:12.5px;color:var(--ac,#ff8a4c);background:rgba(255,138,76,.07)\" style-hover=\"filter:brightness(1.12)\">📋 Pikkit ↗<\u002Fbutton>\n                  <button data-id=\"{{ t.id }}\" data-book=\"playbook\" onclick=\"{{ sendToBook }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:1px solid rgba(196,181,253,.3);border-radius:9px;cursor:pointer;font-weight:700;font-size:12.5px;color:#c4b5fd;background:rgba(196,181,253,.07)\" style-hover=\"filter:brightness(1.12)\">📋 Playbook ↗<\u002Fbutton>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ t.pendingAuto }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-top:11px;padding:8px 11px;border-radius:9px;background:rgba(53,208,192,.07);border:1px solid rgba(53,208,192,.18)\">\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:var(--pos,#35d0c0);animation:dlpulse 1.6s infinite;flex:none\"><\u002Fspan>\n                    <span style=\"font-size:12px;color:var(--pos,#35d0c0);font-weight:600\">Auto-grading<\u002Fspan>\n                    <span style=\"font-size:12px;color:#7b8597\">· settles when final<\u002Fspan>\n                    <span style=\"display:flex;gap:11px;margin-left:auto\">\n                      <button data-id=\"{{ t.id }}\" data-result=\"won\" onclick=\"{{ setResult }}\" style=\"background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;color:#7b8597;padding:0\" style-hover=\"color:var(--pos,#35d0c0)\">mark won<\u002Fbutton>\n                      <button data-id=\"{{ t.id }}\" data-result=\"lost\" onclick=\"{{ setResult }}\" style=\"background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;color:#7b8597;padding:0\" style-hover=\"color:#ff8d8d\">mark lost<\u002Fbutton>\n                    <\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.pendingManual }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:11px\">\n                    <div style=\"font-size:11.5px;color:#9aa3b2;margin-bottom:7px\">No game link on this slip — grade it manually:<\u002Fdiv>\n                    <div style=\"display:flex;gap:8px\">\n                      <button data-id=\"{{ t.id }}\" data-result=\"won\" onclick=\"{{ setResult }}\" style=\"flex:1;padding:8px;border:1px solid rgba(53,208,192,.3);border-radius:9px;cursor:pointer;font-weight:700;font-size:12.5px;color:var(--pos,#35d0c0);background:rgba(53,208,192,.08)\">Won<\u002Fbutton>\n                      <button data-id=\"{{ t.id }}\" data-result=\"lost\" onclick=\"{{ setResult }}\" style=\"flex:1;padding:8px;border:1px solid rgba(255,107,107,.25);border-radius:9px;cursor:pointer;font-weight:700;font-size:12.5px;color:#ff8d8d;background:rgba(255,107,107,.07)\">Lost<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- RESEARCH (live) -->\n      <sc-if value=\"{{ isResearch }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"margin-bottom:20px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">RESEARCH · AWARENESS<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Market intelligence<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:580px\">Live book disagreement, price moves since your last session, and top-value plays from today's model board.<\u002Fp>\n        <\u002Fdiv>\n\n        <div data-mcol1=\"\" style=\"display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,.8fr);gap:18px;align-items:start\">\n          <div>\n            <!-- TOP VALUE PLAYS -->\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><span style=\"font-size:17px\">🎯<\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:17px;font-weight:700\">Top value plays<\u002Fh2><span style=\"font-size:11px;color:#7b8597;margin-left:2px\">{{ valueRankLabel }}<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;margin-bottom:18px\">\n              <div style=\"overflow-x:auto\">\n              <sc-for list=\"{{ topValue }}\" as=\"p\" hint-placeholder-count=\"8\">\n                    <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13px;min-width:340px\">\n                <thead><tr style=\"background:#0c0e14;color:#7b8597\">\n                  <th style=\"padding:10px 14px;font-weight:600;font-size:11px;text-align:left\">PLAYER<\u002Fth>\n                  <th style=\"padding:10px 10px;font-weight:600;font-size:11px;text-align:right\">MODEL%<\u002Fth>\n                  <th style=\"padding:10px 10px;font-weight:600;font-size:11px;text-align:right\">BEST<\u002Fth>\n                  <th style=\"padding:10px 10px;font-weight:600;font-size:11px;text-align:right\">EV<\u002Fth>\n                  <th style=\"padding:10px 14px;font-weight:600;font-size:11px;text-align:right\">SCORE<\u002Fth>\n                <\u002Ftr><\u002Fthead>\n                <tbody>\n                  <tr style=\"border-top:1px solid rgba(255,255,255,.05);cursor:pointer\" data-player=\"{{ p.id }}\" onclick=\"{{ openDrawer }}\">\n                      <td style=\"padding:10px 14px;font-weight:600;white-space:nowrap\">{{ p.name }}<span style=\"color:#7b8597;font-size:11px;margin-left:7px\">{{ p.teamAbbr }}<\u002Fspan><\u002Ftd>\n                      <td style=\"padding:10px 10px;font-family:'Space Grotesk';text-align:right\">{{ p.modelPct }}%<\u002Ftd>\n                      <td style=\"padding:10px 10px;font-family:'Space Grotesk';font-weight:700;text-align:right\">{{ p.best }}<\u002Ftd>\n                      <td style=\"padding:10px 10px;font-family:'Space Grotesk';font-weight:700;text-align:right;color:var(--pos,#35d0c0)\">{{ p.ev }}<\u002Ftd>\n                      <td style=\"padding:10px 14px;font-family:'Space Grotesk';font-weight:700;text-align:right;color:var(--ac,#ff8a4c)\">{{ p.score }}<\u002Ftd>\n                    <\u002Ftr>\n                  \n                <\u002Ftbody>\n              <\u002Ftable>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- WHAT CHANGED -->\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><span style=\"font-size:17px\">📈<\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:17px;font-weight:700\">What changed<\u002Fh2><span style=\"font-size:11px;color:#7b8597;margin-left:2px\">vs last session<\u002Fspan><\u002Fdiv>\n            <sc-if value=\"{{ hasDiff }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <sc-for list=\"{{ diffItems }}\" as=\"d\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:13px;background:#13161e;border:1px solid rgba(255,255,255,.07)\">\n                    <span style=\"font-size:16px\">{{ d.moveIcon }}<\u002Fspan>\n                    <div style=\"flex:1\"><div style=\"font-weight:700;font-size:13.5px\">{{ d.name }}<\u002Fdiv><div style=\"font-size:12px;color:#8b94a6;margin-top:2px\">{{ d.prev }} → <b style=\"color:#eef1f6\">{{ d.cur }}<\u002Fb> <span style=\"color:{{ d.moveColor }}\">{{ d.move }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;background:{{ d.chipBg }};color:{{ d.moveColor }}\">{{ d.dir }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noDiff }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"padding:14px 16px;border-radius:13px;background:#13161e;border:1px solid rgba(255,255,255,.07);color:#7b8597;font-size:13.5px\">\n                No price moves detected yet — the feed populates after your second refresh of the day once odds snapshot is stored.\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- STEAM RADAR -->\n          <div>\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><span style=\"font-size:17px\">🔥<\u002Fspan><h2 style=\"margin:0;font-family:'Space Grotesk';font-size:17px;font-weight:700\">Steam radar<\u002Fh2><\u002Fdiv>\n            <sc-if value=\"{{ hasSteam }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{ steam }}\" as=\"s\" hint-placeholder-count=\"4\">\n                  <div style=\"padding:14px;border-radius:14px;background:#13161e;border:1px solid rgba(255,94,168,.24)\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px\">\n                      <div><div style=\"font-weight:700;font-size:14px\">{{ s.name }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7b8597\">{{ s.team }}<\u002Fdiv><\u002Fdiv>\n                      <span style=\"font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:7px;background:rgba(255,94,168,.14);color:#ff5ea8\">{{ s.spread }}pp spread<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:#c3cad6;line-height:1.5\">{{ s.sharpBook }} moved to <b style=\"color:#eef1f6\">{{ s.sharpOdds }}<\u002Fb>. {{ s.laggingBook }} still at <b style=\"color:var(--pos,#35d0c0)\">{{ s.laggingOdds }}<\u002Fb> — potential stale value.<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noSteam }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"padding:16px;border-radius:14px;background:#13161e;border:1px solid rgba(255,255,255,.07);color:#7b8597;font-size:13px;line-height:1.5\">\n                <sc-if value=\"{{ oddsConnected }}\" hint-placeholder-val=\"{{ false }}\">\n                  No significant book disagreements on today's HR market right now. Radar updates on each Refresh.\n                <\u002Fsc-if>\n                <sc-if value=\"{{ oddsNotConnected }}\" hint-placeholder-val=\"{{ true }}\">\n                  Odds not connected. The steam radar compares all 4 books — connect via Refresh to activate it.\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- TOOLS -->\n      <sc-if value=\"{{ isTools }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:dlrise .35s ease both\">\n        <div style=\"margin-bottom:20px\">\n          <div style=\"font-size:11px;letter-spacing:.14em;color:var(--ac,#ff8a4c);font-weight:700;margin-bottom:6px\">TOOLS &amp; METHODOLOGY<\u002Fdiv>\n          <h1 style=\"margin:0;font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.02em\">Controls &amp; exports<\u002Fh1>\n          <p style=\"margin:6px 0 0;color:#8b94a6;font-size:14px;max-width:560px\">Model tuning, exposure guardrails, exports and methodology — the deeper machinery, out of the main flow.<\u002Fp>\n        <\u002Fdiv>\n        <div data-mcol1=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px\">\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:16px\"><span style=\"font-size:17px\">⚙️<\u002Fspan><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px\">Model settings<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:8px\"><span style=\"color:#9aa3b2\">Season regression<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;color:var(--ac,#ff8a4c)\">0.62<\u002Fspan><\u002Fdiv>\n                <div style=\"height:6px;border-radius:6px;background:rgba(255,255,255,.08);position:relative\"><div style=\"width:62%;height:100%;border-radius:6px;background:var(--ac,#ff8a4c)\"><\u002Fdiv><div style=\"position:absolute;left:62%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#eef1f6;box-shadow:0 1px 4px rgba(0,0,0,.5)\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:11px;color:#7b8597;margin-top:5px\">Weights season HR/PA towards regressed mean. Higher = more trust in small samples.<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:8px\"><span style=\"color:#9aa3b2\">Recent-form weight<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;color:var(--ac,#ff8a4c)\">0.40<\u002Fspan><\u002Fdiv>\n                <div style=\"height:6px;border-radius:6px;background:rgba(255,255,255,.08);position:relative\"><div style=\"width:40%;height:100%;border-radius:6px;background:var(--ac,#ff8a4c)\"><\u002Fdiv><div style=\"position:absolute;left:40%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#eef1f6;box-shadow:0 1px 4px rgba(0,0,0,.5)\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:11px;color:#7b8597;margin-top:5px\">Last-30-day HR rate multiplier. 0 = ignore recency, 1 = replace season rate.<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:8px\"><span style=\"color:#9aa3b2\">Park / weather factor<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;color:var(--ac,#ff8a4c)\">0.75<\u002Fspan><\u002Fdiv>\n                <div style=\"height:6px;border-radius:6px;background:rgba(255,255,255,.08);position:relative\"><div style=\"width:75%;height:100%;border-radius:6px;background:var(--ac,#ff8a4c)\"><\u002Fdiv><div style=\"position:absolute;left:75%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#eef1f6;box-shadow:0 1px 4px rgba(0,0,0,.5)\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:11px;color:#7b8597;margin-top:5px\">Blend of park HR factor with the raw rate. 1.0 = full park adjustment.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:16px\"><span style=\"font-size:17px\">🎯<\u002Fspan><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px\">Exposure guardrails<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;background:#0c0e14\"><span style=\"font-size:13px;color:#c3cad6\">Max slips per player<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:17px\">2<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;background:#0c0e14\"><span style=\"font-size:13px;color:#c3cad6\">Max daily stake<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:17px\">$120<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;background:#0c0e14\"><span style=\"font-size:13px;color:#c3cad6\">Kelly fraction<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:17px\">¼<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;background:#0c0e14\"><span style=\"font-size:13px;color:#c3cad6\">Min edge to bet<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:17px;color:var(--pos,#35d0c0)\">+3.0%<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;background:#0c0e14\"><span style=\"font-size:13px;color:#c3cad6\">Min PA (qualified)<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:17px\">90<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:16px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:14px\"><span style=\"font-size:17px\">🔌<\u002Fspan><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:15px\">Live odds proxy<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#8b94a6;line-height:1.5;margin-bottom:14px\">Your OddsBlaze key is read from the <code style=\"background:#0c0e14;padding:2px 6px;border-radius:5px;font-size:12px\">ODDSBLAZE_KEY<\u002Fcode> env variable on your Render server. Point the app at whichever Render deployment URL you use.<\u002Fdiv>\n          <div style=\"display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:11px\">\n            <div style=\"display:flex;align-items:center;flex:1;min-width:240px;padding:10px 13px;border-radius:11px;background:#0c0e14;border:1px solid rgba(255,138,76,.3)\">\n              <span style=\"font-size:12.5px;color:#9aa3b2;white-space:nowrap;margin-right:8px\">Proxy URL<\u002Fspan>\n              <input type=\"text\" value=\"{{ proxyUrl }}\" onchange=\"{{ setProxyUrl }}\" placeholder=\"https://your-app.onrender.com\" style=\"flex:1;background:transparent;border:none;color:#eef1f6;font-size:13px;font-weight:600;outline:none;min-width:0\">\n            <\u002Fdiv>\n            <button onclick=\"{{ saveProxyUrl }}\" style=\"padding:10px 16px;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;color:#0a0c11;background:var(--ac,#ff8a4c);white-space:nowrap\">Save &amp; reload<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:12.5px\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ oddsProxyColor }};flex:none\"><\u002Fspan><span style=\"color:{{ oddsProxyColor }};font-weight:600\">{{ oddsProxyStatus }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px\">\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;cursor:pointer\" style-hover=\"border-color:rgba(255,138,76,.4)\"><div style=\"font-size:22px;margin-bottom:9px\">✍️<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14.5px\">Manual entry<\u002Fdiv><div style=\"font-size:12.5px;color:#8b94a6;margin-top:5px;line-height:1.4\">Add a game or prop by hand when a book hasn't posted.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;cursor:pointer\" style-hover=\"border-color:rgba(255,138,76,.4)\"><div style=\"font-size:22px;margin-bottom:9px\">⬇️<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14.5px\">Export data<\u002Fdiv><div style=\"font-size:12.5px;color:#8b94a6;margin-top:5px;line-height:1.4\">Feature store CSV / JSON and frozen board snapshots for analysis.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;cursor:pointer\" style-hover=\"border-color:rgba(255,138,76,.4)\"><div style=\"font-size:22px;margin-bottom:9px\">🧪<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14.5px\">Recalibrate<\u002Fdiv><div style=\"font-size:12.5px;color:#8b94a6;margin-top:5px;line-height:1.4\">Re-fit HR probabilities from your graded tracking results.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#13161e;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;cursor:pointer\" style-hover=\"border-color:rgba(255,138,76,.4)\"><div style=\"font-size:22px;margin-bottom:9px\">📐<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:14.5px\">Methodology<\u002Fdiv><div style=\"font-size:12.5px;color:#8b94a6;margin-top:5px;line-height:1.4\">Poisson rate model + Gaussian-copula correlation. k=130 regression, 4-book OddsBlaze.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n\n    <!-- BET SLIP -->\n    <aside data-slip=\"\" data-open=\"{{ slipOpenStr }}\" style=\"border-left:1px solid rgba(255,255,255,.06);padding:20px 18px;position:sticky;top:67px;align-self:start;height:calc(100vh - 67px);overflow:auto;overflow-x:hidden;background:#0a0c11\">\n    <sc-if value=\"{{ slipOpen }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\">\n        <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"font-size:17px\">🎟️<\u002Fspan><h3 style=\"margin:0;font-family:'Space Grotesk';font-size:16px;font-weight:700\">Bet Slip<\u002Fh3><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:7px\">\n          <sc-if value=\"{{ hasSlip }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--ac,#ff8a4c);color:#0a0c11\">{{ slipCountLabel }}<\u002Fspan>\n            <button onclick=\"{{ clearSlip }}\" style=\"padding:4px 9px;border:1px solid rgba(255,255,255,.14);border-radius:8px;background:transparent;color:#9aa3b2;font-size:11.5px;font-weight:600;cursor:pointer\">✕ Clear<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ hasNoSlip }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.07);color:#7b8597\">empty<\u002Fspan>\n          <\u002Fsc-if>\n          <button onclick=\"{{ toggleSlip }}\" style=\"padding:4px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:#161a24;color:#9aa3b2;cursor:pointer;font-size:11.5px;font-weight:600\" style-hover=\"color:#eef1f6\" title=\"Hide slip\">Close<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasNoSlip }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"border:1px dashed rgba(255,255,255,.12);border-radius:13px;padding:22px 14px;text-align:center;color:#7b8597;margin-bottom:16px\">\n          <div style=\"font-size:13px;line-height:1.5\">Tap a play to open its report, then <b style=\"color:#c3cad6\">+ Add to slip<\u002Fb> to build a parlay here.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ hasSlip }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:14px\">\n          <sc-for list=\"{{ slipLegs }}\" as=\"leg\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:12px;background:#13161e;border:1px solid rgba(255,255,255,.08)\">\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-weight:700;font-size:13.5px\">{{ leg.name }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#7b8597;margin-top:2px\">{{ leg.market }} · <span style=\"font-family:'Space Grotesk';color:var(--ac,#ff8a4c)\">{{ leg.odds }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <button data-legid=\"{{ leg.id }}\" onclick=\"{{ removeFromSlip }}\" style=\"background:transparent;border:none;color:#7b8597;cursor:pointer;font-size:15px;padding:2px 4px;flex:none\" style-hover=\"color:#ff6b6b\">✕<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:14px;border-radius:13px;background:#0f1218;border:1px solid rgba(255,255,255,.07);margin-bottom:12px\">\n          <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px\"><span style=\"color:#9aa3b2\">Parlay odds<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700\">{{ parlayOdds }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px\"><span style=\"color:#9aa3b2\">Win chance<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700\">{{ parlayWin }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:12px\"><span style=\"color:#9aa3b2\">Model EV<\u002Fspan><span style=\"font-family:'Space Grotesk';font-weight:700;color:var(--pos,#35d0c0)\">{{ parlayEv }}<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-bottom:7px\">\n            <div style=\"font-size:11px;color:#7b8597;font-weight:600;letter-spacing:.04em;margin-bottom:7px\">STAKE<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;padding:11px 14px;border-radius:12px;background:#0c0e14;border:2px solid rgba(255,138,76,.35)\">\n              <span style=\"font-size:17px;font-weight:700;color:#9aa3b2;margin-right:5px\">$<\u002Fspan>\n              <input type=\"text\" inputmode=\"decimal\" value=\"{{ stake }}\" onchange=\"{{ setStake }}\" placeholder=\"25\" style=\"flex:1;background:transparent;border:none;color:#eef1f6;font-family:'Space Grotesk';font-size:22px;font-weight:700;outline:none;min-width:0;width:100%\">\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:6px;margin-top:8px\">\n              <button data-amount=\"10\" onclick=\"{{ setStakePreset }}\" style=\"flex:1;padding:7px 4px;border:1px solid rgba(255, e())) return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); } catch (e) {}\n    return this.dateStr();\n  }\n  // Shape a tracked slip for the server's savedParlays ledger (graded by its background loop)\n  toServerSlip(t) {\n    const iso = this.isoFromEntry(t);\n    return { id: t.id, result: t.status === 'won' ? 'win' : t.status === 'lost' ? 'loss' : 'pending', label: t.label, stake: t.stake, odds: t.odds, win: t.win, ev: t.ev, date: iso,\n      legData: (t.legs || []).map(l => ({ name: l.name, mlbId: l.id != null ? l.id : null, gamePk: l.gameId != null ? l.gameId : null, date: iso, mkt: 'hr', hit: (l.won === true ? true : l.won === false ? false : null) })) };\n  }\n  // Push the full ledger so the server can settle it even while this tab is closed\n  async pushTracked() {\n    const base = (this.state.proxyUrl || '').replace(/\\/$/, '');\n    if (!base || !(this.state.tracked || []).length) return;\n    try { await this.tFetch(base + '/api/state', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ savedParlays: (this.state.tracked || []).map(t => this.toServerSlip(t)) }) }, 12000); } catch (e) {}\n  }\n  // Authoritative grading via the server: push ledger, trigger a grade pass, merge verdicts back\n  async serverGrade() {\n    const base = (this.state.proxyUrl || '').replace(/\\/$/, '');\n    if (!base) return false;\n    await this.pushTracked();\n    let state = null;\n    try { const r = await this.tFetch(base + '/api/grade', { method: 'POST' }, 25000).then(r => r.ok ? r.json() : null); state = r && r.state; } catch (e) {}\n    if (!state) { try { state = await this.tFetch(base + '/api/state', null, 12000).then(r => r.ok ? r.json() : null); } catch (e) {} }\n    if (!state || !Array.isArray(state.savedParlays)) return false;\n    const byId = {}; state.savedParlays.forEach(s => { if (s && s.id != null) byId[s.id] = s; });\n    let changed = false;\n    const merged = (this.state.tracked || []).map(t => {\n      if (t.status !== 'pending') return t;\n      const s = byId[t.id]; if (!s) return t;\n      if (s.result === 'win' || s.result === 'loss') {\n        changed = true;\n        const legs = (t.legs || []).map((l, i) => { const sl = (s.legData || [])[i]; return (sl && sl.hit != null) ? Object.assign({}, l, { won: !!sl.hit, done: true }) : l; });\n        return Object.assign({}, t, { legs, status: s.result === 'win' ? 'won' : 'lost', gradedAt: Date.now(), autoGraded: true, gradeSource: 'server' });\n      }\n      return t;\n    });\n    if (changed) { try { localStorage.setItem('dl_tracked_v1', JSON.stringify(merged.slice(0, 50))); } catch (e) {} this.setState({ tracked: merged }); }\n    return changed;\n  }\n  // Orchestrator: server first (authoritative), then client-direct fallback for anything still open\n  async autoGrade() {\n    if (this._grading) return;\n    if (!(this.state.tracked || []).some(t => t.status === 'pending')) return;\n    this._grading = true;\n    try { await this.serverGrade(); } catch (e) {}\n    try { await this.clientGrade(); } catch (e) {}\n    this._grading = false;\n  }\n  async clientGrade() {\n    const pending = (this.state.tracked || []).filter(t => t.status === 'pending');\n    if (!pending.length) return;\n    try {\n      this._gameCache = this._gameCache || {};\n      const gids = [...new Set(pending.flatMap(t => (t.legs || []).map(l => l.gameId).filter(g => g != null)))];\n      await Promise.all(gids.map(async gid => {\n        const cached = this._gameCache[gid];\n        if (cached && cached.final) return; // finished games never change — don't refetch\n        try {\n          const j = await this.tFetch('https://statsapi.mlb.com/api/v1.1/game/' + gid + '/feed/live', null, 12000).then(r => r.ok ? r.json() : null);\n          if (!j) return;\n          const state = (j.gameData && j.gameData.status && j.gameData.status.abstractGameState) || null;\n          const homered = new Set();\n          const plays = (j.liveData && j.liveData.plays && j.liveData.plays.allPlays) || [];\n          plays.forEach(pl => { if (pl.result && pl.result.eventType === 'home_run') { const b = pl.matchup && pl.matchup.batter && pl.matchup.batter.fullName; if (b) homered.add(this.normName(b)); } });\n          this._gameCache[gid] = { final: state === 'Final', state, homered };\n        } catch (e) {}\n      }));\n      let changed = false;\n      const graded = (this.state.tracked || []).map(t => {\n        if (t.status !== 'pending') return t;\n        const legs = (t.legs || []).map(l => Object.assign({}, l));\n        let anyConfirmedLoss = false, allFinalWon = legs.length > 0;\n        legs.forEach(l => {\n          if (l.gameId == null) { allFinalWon = false; return; }\n          const gc = this._gameCache[l.gameId];\n          if (gc && gc.final) { l.won = gc.homered.has(l.key); l.done = true; if (!l.won) { anyConfirmedLoss = true; allFinalWon = false; } }\n          else { allFinalWon = false; }\n        });\n        let status = 'pending';\n        if (anyConfirmedLoss) status = 'lost';\n        else if (allFinalWon) status = 'won';\n        if (status !== 'pending') { changed = true; return Object.assign({}, t, { legs, status, gradedAt: Date.now(), autoGraded: true }); }\n        return Object.assign({}, t, { legs });\n      });\n      if (changed) {\n        try { localStorage.setItem('dl_tracked_v1', JSON.stringify(graded.slice(0, 50))); } catch (e) {}\n        this.setState({ tracked: graded });\n      }\n    } catch (e) {}\n  }\n\n  async liveRefresh() {\n    if (!this.state.data) return;\n    this._refreshing = true;\n    try {\n      const { players, games } = this.state.data;\n      const od = await Promise.race([this.fetchOdds(), new Promise((res) => setTimeout(() => res({ best: {}, perBook: {}, booksOk: 0 }), 25000))]);\n      const oddsMap = od.best || {}, perBookMap = od.perBook || {}, booksOk = od.booksOk || 0;\n      players.forEach(p => { const k = this.normName(p.name); const a = oddsMap[k]; if (a != null) p.oddsAm = a; else delete p.oddsAm; const pb = perBookMap[k]; if (pb) p.oddsPerBook = pb; });\n      // price diff vs stored snapshot\n      const nowSnap = players.filter(p => p.oddsAm != null).slice(0, 120).map(p => ({ k: this.normName(p.name), name: p.name, odds: p.oddsAm }));\n      let priceDiff = [];\n      try {\n        const prev = JSON.parse(localStorage.getItem('dl_snap_v1') || '[]');\n        const prevMap = {}; prev.forEach(s => { prevMap[s.k] = s.odds; });\n        priceDiff = nowSnap.filter(s => prevMap[s.k] != null && Math.abs(s.odds - prevMap[s.k]) >= 12).map(s => ({ name: s.name, prev: prevMap[s.k], cur: s.odds, move: s.odds - prevMap[s.k] })).sort((a, b) => Math.abs(b.move) - Math.abs(a.move));\n      } catch (e) {}\n      try { localStorage.setItem('dl_snap_v1', JSON.stringify(nowSnap)); } catch (e) {}\n      const boardSet = new Set(players.map(p => this.normName(p.name)));\n      let liveHRs = this.state.data.liveHRs || [], homeredSet = new Set();\n      try { const r = await this.fetchTodayHRs(games, boardSet); liveHRs = r.feed; homeredSet = r.homered; } catch (e) {}\n      const statusMap = this.state.data.statusMap || {};\n      const gradedTracked = this.gradeTracked(this.state.tracked, homeredSet, statusMap, oddsMap);\n      try { localStorage.setItem('dl_tracked_v1', JSON.stringify(gradedTracked.slice(0, 50))); } catch (e) {}\n      this.setState({ tracked: gradedTracked, data: Object.assign({}, this.state.data, { oddsCount: Object.keys(oddsMap).length, booksOk, priceDiff, liveHRs }), lastUpdated: Date.now() });\n    } catch (e) {}\n    this._refreshing = false;\n  }\n  toggleAutoPoll = () => { this.setState(s => ({ autoPoll: !s.autoPoll })); };\n  rerollUlx = () => { this.setState(s => ({ ulxSeed: s.ulxSeed + 1, ulxSel: null })); };\n  swapUlxLeg = (e) => {\n    const i = parseInt(e.currentTarget.dataset.legidx);\n    const u = this._ulx; if (!u || !u.swap
